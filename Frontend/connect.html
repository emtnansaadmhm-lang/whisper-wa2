<!DOCTYPE html>
<html lang="en" dir="rtl"><head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whisper-WA | Connect</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary-dark:#1f5f3b;
      --primary-mid:#3f9b5f;
      --primary-light:#5fbf7a;
      --accent-glow:#8fd9a8;
      --bg-dark:#0e1a12;
      --glass-bg: rgba(20, 40, 30, 0.65);
      --glass-border: rgba(95, 191, 122, 0.3);
      --text-white:#ffffff;
      --text-muted:#c2dec9;
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{
      font-family:'Tajawal',sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-white);
      height:100vh;
      overflow:hidden;
      background-image:
        linear-gradient(rgba(31,95,59,0.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31,95,59,0.10) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .animated-bg-logo{
      position: fixed;
      top:50%;
      left:50%;
      transform: translate(-50%,-50%);
      z-index:-1;
      width: 600px;
      pointer-events:none;
      opacity:0.18;
      animation: cyberGlowPulse 8s ease-in-out infinite alternate;
    }
    .animated-bg-logo img{
      width:100%;
      filter: drop-shadow(0 0 30px var(--primary-mid));
    }
    @keyframes cyberGlowPulse{
      0%{ opacity:0.12; transform: translate(-50%,-50%) scale(0.96); }
      100%{ opacity:0.28; transform: translate(-50%,-50%) scale(1.04); }
    }
    .main-container{
      display:flex;
      flex-direction:column;
      height:100vh;
      padding:24px;
      gap:18px;
      position:relative;
      z-index:1;
    }
    .center{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .card{
      width:min(920px, 95vw);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(14px);
      border-radius: 22px;
      padding: 26px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }
    .card h1{
      font-size: 1.7rem;
      margin-bottom: 6px;
    }
    .subtitle{
      color: var(--text-muted);
      margin-bottom: 18px;
      line-height:1.6;
    }
    .card h1,
    .subtitle {
      text-align: center;
    }
    .tabs{
      display:flex;
      gap:0;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      overflow:hidden;
      margin-bottom: 14px;
    }
    .tab-btn{
      flex:1;
      padding: 12px 14px;
      cursor:pointer;
      background: transparent;
      color: var(--text-muted);
      border: none;
      font-weight:900;
      transition:0.25s;
    }
    .tab-btn.active{
      background: rgba(95,191,122,0.16);
      color: var(--accent-glow);
      box-shadow: inset 0 -3px 0 rgba(143,217,168,0.9);
    }
    .tab-content{ display:none; }
    .tab-content.active{ display:block; }

    .panel{
      background: rgba(0,0,0,0.16);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      padding: 16px;
    }

    label{
      display:block;
      color: var(--text-muted);
      font-weight:800;
      margin: 8px 0 8px;
    }
    input{
      width:100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.24);
      color: white;
      outline:none;
      font-size: 1rem;
    }
    input::placeholder{
      color: rgba(194,222,201,0.65);
    }

    .note{
      margin-top: 10px;
      color: rgba(194,222,201,0.92);
      font-size: 0.95rem;
      line-height:1.55;
    }

    .actions{
      display:flex;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .btn{
      flex:1;
      padding: 12px 14px;
      border-radius: 14px;
      cursor:pointer;
      font-weight:900;
      border: none;
      transition:0.25s;
      user-select:none;
      min-width: 180px;
      font-family:'Tajawal',sans-serif;
      font-size: 1rem;
      text-align:center;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .btn-primary{
      background: linear-gradient(45deg, var(--primary-dark), var(--primary-mid));
      color:white;
    }
    .btn-ghost{
      background: rgba(0,0,0,0.18);
      color: var(--accent-glow);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .btn.ready{
      background: rgba(95,191,122,0.28);
      color: #d8ffe4;
      border: 1px solid rgba(95,191,122,0.55);
      animation: glowPulse 1.8s ease-in-out infinite;
      box-shadow: 0 0 12px rgba(95,191,122,0.5);
    }

    @keyframes glowPulse{
      0%{ box-shadow: 0 0 8px rgba(95,191,122,0.3); }
      50%{ box-shadow: 0 0 18px rgba(95,191,122,0.8); }
      100%{ box-shadow: 0 0 8px rgba(95,191,122,0.3); }
    }

    .btn:disabled{
      opacity:0.65;
      cursor:not-allowed;
    }

    .alert{
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      font-weight:900;
      white-space: pre-wrap;
      line-height: 1.65;
      text-align: center;
      direction: rtl;
    }
    .alert.hidden{ display:none; }
    .alert.danger{
      background: rgba(255,107,107,0.12);
      border-color: rgba(255,107,107,0.30);
      color: #ffd1d1;
    }
    .alert.success{
      background: rgba(95,191,122,0.16);
      border-color: rgba(95,191,122,0.45);
      color: #d8ffe4;
    }
    .alert.info{
      background: rgba(143,217,168,0.10);
      border-color: rgba(143,217,168,0.28);
      color: #c2dec9;
    }

    .modal-overlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }
    .modal-overlay.show{
      display: flex;
    }
    .modal-box{
      width: min(680px, 95vw);
      max-height: 80vh;
      overflow: hidden;
      background: rgba(14,26,18,0.96);
      border: 1px solid rgba(95, 191, 122, 0.35);
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      display: flex;
      flex-direction: column;
    }
    .modal-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .modal-title{
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--text-white);
    }
    .modal-close{
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
    }
    .modal-body{
      padding: 14px 18px 18px;
      overflow: auto;
    }
    .case-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .case-item{
      width:100%;
      text-align:left;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: white;
      border-radius: 14px;
      padding: 14px;
      cursor:pointer;
      transition: 0.2s;
      font-family:'Tajawal',sans-serif;
    }
    .case-item:hover{
      border-color: rgba(95,191,122,0.55);
      background: rgba(95,191,122,0.10);
    }
    .case-id{
      font-weight: 900;
      font-size: 1rem;
      margin-bottom: 4px;
      color: var(--accent-glow);
    }
    .case-date{
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .empty-state{
      color: var(--text-muted);
      text-align:center;
      padding: 20px 0;
      line-height: 1.8;
    }

    /* ===== Toast Notifications ===== */
    #toast-container{
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: auto;
      z-index: 10000;
      display: flex;
      flex-direction: column-reverse;
      gap: 10px;
      pointer-events: none;
    }

.forensic-toast{
  pointer-events: auto;
  width: 320px;
  background: rgba(16, 28, 22, 0.97);
  border-left: 3px solid #ffc107;
  padding: 12px 14px;
  border-radius: 14px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.45);
  animation: slideInLeft 0.35s ease forwards;
  border: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
}

    @keyframes slideInLeft{
      from{ transform: translateX(-100%); opacity: 0; }
      to{ transform: translateX(0); opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="animated-bg-logo">
    <img src="logo.png" alt="Background Logo">
  </div>

  <div class="main-container">
    <div id="header-placeholder"></div>

    <main class="center">
      <section class="card">
        <h1>Connect Device</h1>
        <p class="subtitle">Select a connection method, then click Connect to start backend workflow.</p>

        <div class="tabs">
          <button class="tab-btn active" data-tab="wifiTab" id="tabWifi" type="button">Wi-Fi (IP:PORT)</button>
          <button class="tab-btn" data-tab="usbTab" id="tabUsb" type="button">USB</button>
        </div>

        <div class="tab-content active" id="wifiTab">
          <div class="panel">
            <form id="wifiForm">
              <label for="ipInput">Device IP:PORT</label>
              <input id="ipInput" name="ip_port" type="text" placeholder="e.g. 192.168.56.101:5555" />

              <div class="note">Enter IP:PORT then press Connect.</div>

              <div class="actions">
                <button class="btn btn-primary" id="btnWifiConnect" type="button">Connect</button>
                <button class="btn btn-ghost" id="btnWifiOldCases" type="button">Open Old Cases</button>
              </div>
            </form>
          </div>
        </div>

        <div class="tab-content" id="usbTab">
          <div class="panel">
            <form id="usbForm">
              <div class="note" style="direction:ltr; text-align:left;">
                1) Connect device using USB cable.<br>
                2) Enable <b>USB Debugging</b>.<br>
                3) Press <b>Connect</b>.
              </div>

              <div class="actions">
                <button class="btn btn-primary" id="btnUsbConnect" type="button">Connect</button>
                <button class="btn btn-ghost" id="btnUsbOldCases" type="button">Open Old Cases</button>
              </div>
            </form>
          </div>
        </div>

        <div class="alert hidden" id="alertBox"></div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="casesModal">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">Old Cases</div>
        <button class="modal-close" id="closeCasesModal" type="button">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="case-list" id="caseList"></div>
      </div>
    </div>
  </div>

<script>
  const API_BASE = "http://127.0.0.1:5000";

  const alertBox = document.getElementById("alertBox");
  const ipInput = document.getElementById("ipInput");

  const btnWifiConnect = document.getElementById("btnWifiConnect");
  const btnUsbConnect = document.getElementById("btnUsbConnect");

  const btnWifiOldCases = document.getElementById("btnWifiOldCases");
  const btnUsbOldCases = document.getElementById("btnUsbOldCases");

  const tabBtns = document.querySelectorAll(".tab-btn");
  const tabs = document.querySelectorAll(".tab-content");

  const casesModal = document.getElementById("casesModal");
  const closeCasesModal = document.getElementById("closeCasesModal");
  const caseList = document.getElementById("caseList");

  let completedCaseId = "";
  let activeWorkflowMethod = localStorage.getItem("workflow_method") || "";
  window.isWorking = false;
  window.statusWatcherTimer = null;

  function getCurrentLang(){
    return localStorage.getItem("lang") || "en";
  }

  function getText(key){
    const lang = getCurrentLang();
    const texts = {
      en: {
        title: "Whisper-WA | Connect",
        heading: "Connect Device",
        subtitle: "Select a connection method, then click Connect",
        wifiTab: "Wi-Fi (IP:PORT)",
        usbTab: "USB",
        wifiLabel: "Device IP:PORT",
        wifiPlaceholder: "e.g. 192.168.56.101:5555",
        wifiNote: "Enter IP:PORT then press Connect.",
        usbNote: `1) Connect device using USB cable.<br>
2) Enable <b>USB Debugging</b>.<br>
3) Press <b>Connect</b>.`,
        connect: "Connect",
        open: "Open",
        working: "Working...",
        oldCases: "Open Old Cases",
        modalTitle: "Old Cases",
        noOldCases: "No old cases found yet.",
        noExtractedChats: "No extracted chats found yet.",
        enterIp: "Please enter IP:PORT",
        noDate: "No date",
        errorPrefix: "Error:",
        waitingMessage: "Processing is running. Please wait until the extraction is completed",
        stillWorkingMessage: "Processing is still running. You will be notified when it is completed",
        successMessage: "Extraction completed successfully\nCase is ready: {case_id}\nPress Open to view the extracted chat",
        failMessage: "The operation failed: {message}"
      },
      ar: {
        title: "Whisper-WA | الاتصال",
        heading: "ربط الجهاز",
        subtitle: "اختر طريقة الاتصال ثم اضغط اتصال",
        wifiTab: "واي فاي (IP:PORT)",
        usbTab: "USB",
        wifiLabel: "IP الجهاز:PORT",
        wifiPlaceholder: "مثال: 192.168.56.101:5555",
        wifiNote: "أدخل IP:PORT ثم اضغط اتصال.",
        usbNote: `1) صِل الجهاز باستخدام سلك USB.<br>
2) فعّل <b>USB Debugging</b>.<br>
3) اضغط <b>اتصال</b>.`,
        connect: "اتصال",
        open: "فتح",
        working: "جاري العمل...",
        oldCases: "فتح القضايا السابقة",
        modalTitle: "القضايا السابقة",
        noOldCases: "لا توجد قضايا سابقة حتى الآن.",
        noExtractedChats: "لا توجد محادثات مستخرجة حتى الآن.",
        enterIp: "الرجاء إدخال IP:PORT",
        noDate: "لا يوجد تاريخ",
        errorPrefix: "خطأ:",
        waitingMessage: "جاري تنفيذ العمليات. الرجاء الانتظار حتى يكتمل الاستخراج.",
        stillWorkingMessage: "العملية لا تزال تعمل. سيتم التنبيه عند الانتهاء.",
        successMessage: "تمت العمليات بنجاح.\nالقضية جاهزة: {case_id}.\nاضغط فتح لعرض المحادثات المستخرجة.",
        failMessage: "فشلت العملية: {message}"
      }
    };

    return texts[lang][key] || texts.en[key] || "";
  }

  function showAlert(type, text){
    alertBox.classList.remove("hidden");
    alertBox.className = "alert " + type;
    alertBox.textContent = text;
  }

  function hideAlert(){
    if (window.isWorking) return;
    alertBox.classList.add("hidden");
    alertBox.textContent = "";
  }

  function getConnectButtonByMethod(method){
    return method === "usb" ? btnUsbConnect : btnWifiConnect;
  }

  function activateTabByMethod(method, keepAlert = true){
    const tabId = method === "usb" ? "usbTab" : "wifiTab";

    tabBtns.forEach(b => b.classList.remove("active"));
    tabs.forEach(t => t.classList.remove("active"));

    const btn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
    const tab = document.getElementById(tabId);

    if (btn) btn.classList.add("active");
    if (tab) tab.classList.add("active");

    localStorage.setItem("active_connect_tab", method);

    if (!keepAlert) hideAlert();
  }

  function resetConnectButtons(){
    [btnWifiConnect, btnUsbConnect].forEach(btn => {
      btn.disabled = false;
      btn.classList.remove("ready");
      btn.textContent = getText("connect");
    });
  }

  function setWorkingState(method){
    activeWorkflowMethod = method;
    localStorage.setItem("workflow_method", method);
    localStorage.setItem("active_connect_tab", method);

    activateTabByMethod(method, true);

    const activeBtn = getConnectButtonByMethod(method);
    const otherBtn = method === "usb" ? btnWifiConnect : btnUsbConnect;

    activeBtn.disabled = true;
    activeBtn.classList.remove("ready");
    activeBtn.textContent = getText("working");

    otherBtn.disabled = true;
  }

  function setOpenState(caseId){
    completedCaseId = caseId;

    localStorage.setItem("case_id", caseId);
    localStorage.setItem("CURRENT_CASE_ID", caseId);

    const method = activeWorkflowMethod || localStorage.getItem("workflow_method") || "wifi";
    activateTabByMethod(method, true);

    const activeBtn = getConnectButtonByMethod(method);
    const otherBtn = method === "usb" ? btnWifiConnect : btnUsbConnect;

    activeBtn.disabled = false;
    activeBtn.classList.add("ready");
    activeBtn.textContent = getText("open");

    otherBtn.disabled = false;
    otherBtn.classList.remove("ready");
    otherBtn.textContent = getText("connect");
  }

  function openChat(caseId){
    if (!caseId) {
      showAlert("danger", getText("noExtractedChats"));
      return;
    }

    localStorage.setItem("case_id", caseId);
    localStorage.setItem("CURRENT_CASE_ID", caseId);

    const target = new URL(`chat.html?case_id=${encodeURIComponent(caseId)}`, window.location.href).href;
    window.location.href = target;
  }

  async function fetchCases(){
    let currentUser = {};
    try {
      currentUser = JSON.parse(localStorage.getItem("currentUser") || "{}");
    } catch(e) {
      currentUser = {};
    }

    const userId = currentUser.id || "";
    const role = currentUser.role || "user";

    let url = `${API_BASE}/api/cases`;
    if (userId) {
      url += `?user_id=${encodeURIComponent(userId)}&role=${encodeURIComponent(role)}`;
    }

    const res = await fetch(url);
    const data = await res.json();

    if(!res.ok || !data.ok){
      throw new Error("Failed to load cases.");
    }

    return Array.isArray(data.cases) ? data.cases : [];
  }

  async function goToLastExtractChat(){
    hideAlert();

    if (completedCaseId) {
      openChat(completedCaseId);
      return;
    }

    try{
      const cases = await fetchCases();

      if(!cases.length){
        showAlert("danger", getText("noExtractedChats"));
        return;
      }

      const latestCase = cases.sort((a, b) =>
        new Date(b.created_at || 0) - new Date(a.created_at || 0)
      )[0];

      openChat(latestCase.case_id);
    }catch(e){
      showAlert("danger", `${getText("errorPrefix")} ${e.message}`);
    }
  }

  function startStatusWatcher(){
    if (window.statusWatcherTimer) {
      clearInterval(window.statusWatcherTimer);
      window.statusWatcherTimer = null;
    }

    window.statusWatcherTimer = setInterval(async () => {
      try {
        const res = await fetch(`${API_BASE}/api/device/status?ts=${Date.now()}`, {
          cache: "no-store"
        });

        const s = await res.json();
        console.log("DEVICE STATUS:", s);

        if (s.state === "done" && s.case_id) {
          clearInterval(window.statusWatcherTimer);
          window.statusWatcherTimer = null;

          localStorage.removeItem("workflow_watch");

          window.isWorking = false;
          setOpenState(s.case_id);

          showAlert(
            "success",
            getText("successMessage").replace("{case_id}", s.case_id)
          );
          return;
        }

        if (s.state === "error") {
          clearInterval(window.statusWatcherTimer);
          window.statusWatcherTimer = null;

          localStorage.removeItem("workflow_watch");

          const message = s.message || "Unknown error";
          showAlert(
            "danger",
            getText("failMessage").replace("{message}", message)
          );

          window.isWorking = false;
          resetConnectButtons();
          return;
        }

        if (localStorage.getItem("workflow_watch") === "1") {
          showAlert("info", getText("stillWorkingMessage"));
        }

      } catch(e) {
        console.warn("Status watcher waiting...", e);
      }
    }, 2000);
  }

  async function runConnectWorkflow(method){
    if (window.isWorking) return;

    if (completedCaseId) {
      openChat(completedCaseId);
      return;
    }

    window.isWorking = true;
    hideAlert();

    let ip = ipInput.value.trim();

    if (method === "wifi") {
      if(!ip){
        window.isWorking = false;
        showAlert("danger", getText("enterIp"));
        return;
      }

      if(!ip.includes(":")){
        ip = `${ip}:5555`;
        ipInput.value = ip;
      }
    }

    let user = {};
    try {
      user = JSON.parse(localStorage.getItem("currentUser") || "{}");
    } catch(e) {
      user = {};
    }

    const payload = {
      method: method,
      ip_port: method === "wifi" ? ip : "",
      wadecrypt_path: "wadecrypt.exe",
      timeout_sec: 180,
      user_id: user.id || ""
    };

    localStorage.setItem("workflow_watch", "1");
    localStorage.setItem("workflow_method", method);

    setWorkingState(method);
    showAlert("info", getText("waitingMessage"));

    startStatusWatcher();

    fetch(`${API_BASE}/api/device/connect-and-notify`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    }).catch(e => {
      console.warn("Ignored fetch error because status watcher is active:", e);
    });
  }

  function showCasesModal(){
    casesModal.classList.add("show");
  }

  function hideCasesModal(){
    casesModal.classList.remove("show");
    caseList.innerHTML = "";
  }

  async function openOldCasesModal(){
    hideAlert();

    try{
      const cases = await fetchCases();

      showCasesModal();

      if(!cases.length){
        caseList.innerHTML = `
          <div class="empty-state">
            ${getText("noOldCases")}
          </div>
        `;
        return;
      }

      caseList.innerHTML = cases.map(c => {
        const createdAt = c.created_at_text || getText("noDate");
        return `
          <button class="case-item" type="button" data-case-id="${c.case_id}">
            <div class="case-id">${c.case_id}</div>
            <div class="case-date">${createdAt}</div>
          </button>
        `;
      }).join("");

      document.querySelectorAll(".case-item").forEach(btn => {
        btn.addEventListener("click", () => {
          const caseId = btn.getAttribute("data-case-id");
          openChat(caseId);
        });
      });

    }catch(e){
      showAlert("danger", `${getText("errorPrefix")} ${e.message}`);
    }
  }

  function applyLang(lang){
    const isAr = lang === "ar";

    document.documentElement.lang = isAr ? "ar" : "en";
    document.documentElement.dir = "rtl";
    document.body.dir = "rtl";

    document.title = getText("title");

    document.querySelector(".card h1").textContent = getText("heading");
    document.querySelector(".subtitle").textContent = getText("subtitle");

    document.getElementById("tabWifi").textContent = getText("wifiTab");
    document.getElementById("tabUsb").textContent = getText("usbTab");

    document.querySelector("#wifiForm label").textContent = getText("wifiLabel");
    document.getElementById("ipInput").placeholder = getText("wifiPlaceholder");

    document.querySelector("#wifiTab .note").textContent = getText("wifiNote");
    document.querySelector("#usbTab .note").innerHTML = getText("usbNote");

    if (window.isWorking) {
      setWorkingState(activeWorkflowMethod || localStorage.getItem("workflow_method") || "wifi");
    } else if (completedCaseId) {
      setOpenState(completedCaseId);
    } else {
      resetConnectButtons();
    }

    document.getElementById("btnWifiOldCases").textContent = getText("oldCases");
    document.getElementById("btnUsbOldCases").textContent = getText("oldCases");

    const modalTitle = document.querySelector(".modal-title");
    if (modalTitle) {
      modalTitle.textContent = getText("modalTitle");
    }
  }

  window.applyLang = applyLang;

  btnWifiOldCases.addEventListener("click", openOldCasesModal);
  btnUsbOldCases.addEventListener("click", openOldCasesModal);

  closeCasesModal.addEventListener("click", hideCasesModal);

  casesModal.addEventListener("click", (e) => {
    if(e.target === casesModal){
      hideCasesModal();
    }
  });

  tabBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      const method = btn.dataset.tab === "usbTab" ? "usb" : "wifi";
      activateTabByMethod(method, false);
    });
  });

async function checkForensicNotifications(){

  let user = {};

  try {
    user = JSON.parse(localStorage.getItem("currentUser") || "{}");
  } catch(e) {
    user = {};
  }

  if (!user.id) return;

  try {

    const res = await fetch(
      `${API_BASE}/api/cases?user_id=${encodeURIComponent(user.id)}&role=${encodeURIComponent(user.role || "user")}`
    );

    const data = await res.json();

    if (data.ok && Array.isArray(data.cases)) {

      // الإشعارات اللي انعرضت سابقاً
      const shownNotifications =
        JSON.parse(localStorage.getItem("shown_case_notifications") || "[]");

      // فقط القضايا الجديدة
      const newSharedCases = data.cases.filter(c => {
        return (
          c.is_owner === false &&
          !shownNotifications.includes(String(c.case_id))
        );
      });

      if (newSharedCases.length > 0) {
        showToastNotifications(newSharedCases);
      }
    }

  } catch(e) {
    console.error("Notification Fetch Error:", e);
  }
}
function showToastNotifications(cases){
  let container = document.getElementById("toast-container");

  if (!container) {
    container = document.createElement("div");
    container.id = "toast-container";
    document.body.appendChild(container);
  }

  const isAr = getCurrentLang() === "ar";

  // القضايا اللي سبق عرض إشعاراتها
  const shownNotifications =
    JSON.parse(localStorage.getItem("shown_case_notifications") || "[]");

  cases.forEach((c, index) => {

    // إذا الإشعار انعرض قبل لا تعيده
    if (shownNotifications.includes(c.case_id)) return;

    setTimeout(() => {

      const toast = document.createElement("div");
      toast.className = "forensic-toast";

      const addedBy = c.added_by_name || "Investigator";

      toast.innerHTML = `
        <div style="
          display:flex;
          align-items:flex-start;
          justify-content:space-between;
          gap:12px;
        ">

          <div style="display:flex; gap:12px; align-items:flex-start;">
            
            <i class="fa-solid fa-handshake-angle"
              style="
                color:#ffc107;
                font-size:1.1rem;
                margin-top:4px;
              ">
            </i>

            <div>
              <div style="
                font-size:0.95rem;
                font-weight:800;
                color:#ffc107;
                margin-bottom:4px;
              ">
                ${isAr ? "مهمة جنائية" : "Forensic Task"}
              </div>

              <div style="
                font-size:0.82rem;
                color:#e8e8e8;
                line-height:1.6;
              ">
                ${
                  isAr
                    ? `المحقق <b>${addedBy}</b> أضافك إلى <b>${c.case_id}</b>`
                    : `Investigator <b>${addedBy}</b> added you to <b>${c.case_id}</b>`
                }
              </div>
            </div>

          </div>

          <button
            type="button"
            class="toast-close-btn"
            style="
              background:none;
              border:none;
              color:#777;
              cursor:pointer;
              font-size:1rem;
              padding:0;
            ">
            <i class="fa-solid fa-xmark"></i>
          </button>

        </div>
      `;

      // زر الإغلاق
      toast.querySelector(".toast-close-btn")
        .addEventListener("click", () => {
          toast.remove();
        });

      container.appendChild(toast);

      // خزّن الإشعار عشان مايتكرر
shownNotifications.push(String(c.case_id));
      localStorage.setItem(
        "shown_case_notifications",
        JSON.stringify(shownNotifications)
      );

    }, index * 250);

  });
}
  window.addEventListener("DOMContentLoaded", async () => {
    applyLang(getCurrentLang());
    checkForensicNotifications();

    const savedTab = localStorage.getItem("active_connect_tab") || "wifi";
    activateTabByMethod(savedTab, true);

    btnWifiConnect.addEventListener("click", () => {
      if (btnWifiConnect.classList.contains("ready") && completedCaseId) {
        openChat(completedCaseId);
        return;
      }
      runConnectWorkflow("wifi");
    });

    btnUsbConnect.addEventListener("click", () => {
      if (btnUsbConnect.classList.contains("ready") && completedCaseId) {
        openChat(completedCaseId);
        return;
      }
      runConnectWorkflow("usb");
    });

    if (localStorage.getItem("workflow_watch") === "1") {
      window.isWorking = true;
      activeWorkflowMethod = localStorage.getItem("workflow_method") || "wifi";
      setWorkingState(activeWorkflowMethod);
      showAlert("info", getText("stillWorkingMessage"));
      startStatusWatcher();
    }

    try{
      const res = await fetch("header.html");
      const headerHtml = await res.text();
      const placeholder = document.getElementById("header-placeholder");
      placeholder.innerHTML = "";

      const temp = document.createElement("div");
      temp.innerHTML = headerHtml;

      const scripts = temp.querySelectorAll("script");
      scripts.forEach(s => s.remove());
      placeholder.append(...temp.childNodes);

      scripts.forEach(old => {
        const s = document.createElement("script");
        if(old.src) s.src = old.src;
        else s.textContent = old.textContent;
        document.body.appendChild(s);
      });

      setTimeout(() => {
        applyLang(getCurrentLang());

        const btnLang = document.getElementById("btnLang");
        if(btnLang){
          btnLang.addEventListener("click", () => {
            setTimeout(() => {
              applyLang(getCurrentLang());
              checkForensicNotifications();
            }, 0);
          });
        }
      }, 0);

    }catch(e){
      console.error("HEADER LOAD ERROR:", e);
    }
  });
</script>
