<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title id="page-window-title">Whisper-WA | تسجيل الدخول</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --primary-dark:#1f5f3b;
  --primary-mid:#3f9b5f;
  --primary-light:#5fbf7a;
  --accent-glow:#8fd9a8;
  --bg-dark:#0e1a12;
  --glass-bg: rgba(20,40,30,0.65);
  --glass-border: rgba(95,191,122,0.3);
  --text-white:#ffffff;
  --text-muted:#c2dec9;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Tajawal',sans-serif;
  background-color:var(--bg-dark);
  color:white;
  min-height:100vh;
  padding:20px;
  background-image:
    radial-gradient(1200px 700px at 20% 10%, rgba(95,191,122,0.12), transparent 55%),
    radial-gradient(900px 600px at 85% 20%, rgba(143,217,168,0.10), transparent 55%),
    linear-gradient(rgba(31,95,59,0.10) 1px, transparent 1px),
    linear-gradient(90deg, rgba(31,95,59,0.10) 1px, transparent 1px);
  background-size:auto,auto,40px 40px,40px 40px;
  transition: all 0.3s ease;
}

.animated-bg-logo{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:-1;
  width:620px;
  opacity:0.18;
  animation:glow 8s ease-in-out infinite alternate;
}

.animated-bg-logo img{
  width:100%;
  filter:drop-shadow(0 0 30px var(--primary-mid));
}

@keyframes glow{
  from{opacity:0.1;transform:translate(-50%,-50%) scale(0.96);}
  to{opacity:0.26;transform:translate(-50%,-50%) scale(1.04);}
}

.ww-topbar{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(12px);
  border-radius:16px;
  padding:12px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}

.ww-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.ww-icon-btn{
  border:none;
  background:rgba(0,0,0,0.18);
  color:#c2dec9;
  width:38px;
  height:38px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  text-decoration:none;
}

.ww-brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.ww-logo{
  height:42px;
}

.ww-title b{
  font-size:1.15rem;
}

.ww-title span{
  color:#c2dec9;
  font-size:0.85rem;
  display:block;
}

.ww-lang-btn{
  background:rgba(95,191,122,0.10);
  border:1px solid rgba(95,191,122,0.3);
  color:#8fd9a8;
  padding:8px 14px;
  border-radius:999px;
  cursor:pointer;
  font-weight:900;
  display:flex;
  align-items:center;
  gap:6px;
  font-family:inherit;
  transition:0.2s;
}

.ww-lang-btn:hover{
  background:rgba(95,191,122,0.20);
}

.main-container{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:80vh;
}

.card{
  width:min(820px,95vw);
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(14px);
  border-radius:22px;
  padding:26px;
}

.tabs{
  display:flex;
  background:rgba(0,0,0,0.18);
  border-radius:16px;
  overflow:hidden;
  margin-bottom:14px;
}

.tab-btn{
  flex:1;
  padding:12px;
  border:none;
  background:none;
  color:var(--text-muted);
  font-weight:900;
  cursor:pointer;
  font-family:inherit;
  font-size:1rem;
}

.tab-btn.active{
  background:rgba(95,191,122,0.16);
  color:var(--accent-glow);
}

.tab-content{display:none;}
.tab-content.active{display:block;}

label{
  display:block;
  margin:10px 0 6px;
  color:var(--text-muted);
  font-weight:800;
}

.required{color:#ff6b6b;}

input,select,textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--glass-border);
  background:rgba(0,0,0,0.25);
  color:white;
  font-family:inherit;
}

textarea{
  min-height:110px;
  resize:vertical;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.actions{
  display:flex;
  gap:12px;
  margin-top:14px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
  border:none;
  font-family:inherit;
  font-size:1rem;
}

.btn-primary{
  background:linear-gradient(45deg,var(--primary-dark),var(--primary-mid));
  color:white;
}

.btn-ghost{
  background:rgba(0,0,0,0.2);
  color:var(--accent-glow);
  border:1px solid rgba(255,255,255,0.1);
}

.alert{
  margin-top:16px;
  padding:12px;
  border-radius:14px;
  font-weight:900;
}

.success{
  background:rgba(95,191,122,0.14);
  border:1px solid rgba(95,191,122,0.3);
}

.danger{
  background:rgba(255,107,107,0.14);
  border:1px solid rgba(255,107,107,0.3);
}

.hidden{display:none;}

@media (max-width: 700px){
  .row{
    grid-template-columns:1fr;
  }
  .actions{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="animated-bg-logo">
  <img src="logo.png" alt="Logo">
</div>

<header class="ww-topbar">
  <div class="ww-left">
    <a href="index.html" class="ww-icon-btn">
      <i class="fa-solid fa-arrow-left" id="back-icon"></i>
    </a>

    <div class="ww-brand">
      <img src="logo.png" class="ww-logo" alt="Logo">
      <div class="ww-title">
        <b>Whisper-WA</b>
        <span id="top-subtitle">منصة التحليل الجنائي الرقمي</span>
      </div>
    </div>
  </div>

  <button class="ww-lang-btn" id="btnLang" type="button">
    <i class="fa-solid fa-globe"></i>
    <span id="langText">English</span>
  </button>
</header>

<div class="main-container">
  <section class="card">

    <h1 id="page-title">التحكم بالوصول</h1>
    <p id="page-subtitle">سجّل دخول أو اطلب حساب</p>

    <div class="tabs">
      <button class="tab-btn active" data-tab="login" id="tab-login-btn" type="button">تسجيل الدخول</button>
      <button class="tab-btn" data-tab="request" id="tab-request-btn" type="button">طلب حساب</button>
    </div>

    <div class="tab-content active" id="login">
      <label id="lbl-email">البريد الإلكتروني</label>
      <input id="loginUser" type="email" placeholder="example@email.com">

      <label id="lbl-password">كلمة المرور</label>
      <input id="loginPass" type="password" placeholder="••••••••">

      <div class="actions">
        <button class="btn btn-primary" id="btnLogin" type="button">تسجيل الدخول</button>
      </div>
    </div>

    <div class="tab-content" id="request">
      <div class="row">
        <div>
          <label id="lbl-name">الاسم الكامل <span class="required">*</span></label>
          <input id="reqName" type="text">
        </div>

        <div>
          <label id="lbl-req-email">البريد الإلكتروني <span class="required">*</span></label>
          <input id="reqEmail" type="email" placeholder="example@email.com">
        </div>
      </div>

      <div class="row">
        <div>
          <label id="lbl-code">كلمة المرور <span class="required">*</span></label>
          <input id="reqCode" type="password">
        </div>

        <div>
          <label id="lbl-dept">القسم</label>
          <select id="reqDept">
            <option value="">-- اختر --</option>
            <option>الأدلة الجنائية الرقمية</option>
            <option>التحقيقات</option>
            <option>الأمن السيبراني</option>
            <option>القانوني والامتثال</option>
            <option>أخرى</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div>
          <label id="lbl-job">المسمى الوظيفي</label>
          <select id="reqJob">
            <option value="">-- اختر --</option>
            <option value="Digital Forensics Analyst">Digital Forensics Analyst</option>
            <option value="SOC Analyst">SOC Analyst</option>
            <option value="Cybersecurity Specialist">Cybersecurity Specialist</option>
            <option value="Investigator">Investigator</option>
            <option value="Incident Responder">Incident Responder</option>
            <option value="Threat Analyst">Threat Analyst</option>
            <option value="Compliance Officer">Compliance Officer</option>
            <option value="Legal Advisor">Legal Advisor</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div></div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="btnSubmitRequest" type="button">إرسال الطلب</button>
        <button class="btn btn-ghost" id="btnClearRequest" type="button">مسح النموذج</button>
      </div>
    </div>

    <div id="alertBox" class="alert hidden"></div>

  </section>
</div>

<script>
const API_URL = "http://localhost:5000/api";

const translations = {
  ar: {
    windowTitle: "Whisper-WA | تسجيل الدخول",
    langBtn: "English",
    topSubtitle: "منصة التحليل الجنائي الرقمي",
    pageTitle: "التحكم بالوصول",
    pageSubtitle: "سجّل دخول أو اطلب حساب",
    tabLoginBtn: "تسجيل الدخول",
    tabRequestBtn: "طلب حساب",
    lblEmail: "البريد الإلكتروني",
    lblPassword: "كلمة المرور",
    btnLogin: "تسجيل الدخول",
    lblName: "الاسم الكامل <span class='required'>*</span>",
    lblReqEmail: "البريد الإلكتروني <span class='required'>*</span>",
    lblCode: "كلمة المرور <span class='required'>*</span>",
    lblDept: "القسم",
    lblJob: "المسمى الوظيفي",
    deptOpts: ["-- اختر --", "الأدلة الجنائية الرقمية", "التحقيقات", "الأمن السيبراني", "القانوني والامتثال", "أخرى"],
    jobOpts: ["-- اختر --", "Digital Forensics Analyst", "SOC Analyst", "Cybersecurity Specialist", "Investigator", "Incident Responder", "Threat Analyst", "Compliance Officer", "Legal Advisor", "Other"],
    btnSubmitRequest: "إرسال الطلب",
    btnClearRequest: "مسح النموذج",
    alertEmptyLogin: "الرجاء إدخال البريد وكلمة المرور",
    alertInvalidLoginEmail: "الرجاء إدخال بريد إلكتروني صحيح",
    alertLoginSuccess: "تم تسجيل الدخول",
    alertLoginFail: "بيانات غير صحيحة",
    alertEmptyReq: "الرجاء تعبئة الحقول المطلوبة",
    alertInvalidEmail: "الرجاء إدخال بريد إلكتروني صحيح ويحتوي على @",
    alertWeakPassword: "كلمة المرور يجب أن تكون 8 أحرف أو أكثر وتحتوي على حرف كبير وحرف صغير ورقم ورمز",
    alertInvalidName: "الاسم يجب أن يحتوي على أحرف فقط",
    alertInvalidJob: "الرجاء اختيار المسمى الوظيفي",
    alertConnection: "تعذر الاتصال بالسيرفر"
  },
  en: {
    windowTitle: "Whisper-WA | Login",
    langBtn: "العربية",
    topSubtitle: "Digital Forensics Platform",
    pageTitle: "Access Control",
    pageSubtitle: "Login or Request an Account",
    tabLoginBtn: "Login",
    tabRequestBtn: "Request Account",
    lblEmail: "Email Address",
    lblPassword: "Password",
    btnLogin: "Login",
    lblName: "Full Name <span class='required'>*</span>",
    lblReqEmail: "Email Address <span class='required'>*</span>",
    lblCode: "Password <span class='required'>*</span>",
    lblDept: "Department",
    lblJob: "Job Title",
    deptOpts: ["-- Select --", "Digital Forensics", "Investigations", "Cybersecurity", "Legal & Compliance", "Other"],
    jobOpts: ["-- Select --", "Digital Forensics Analyst", "SOC Analyst", "Cybersecurity Specialist", "Investigator", "Incident Responder", "Threat Analyst", "Compliance Officer", "Legal Advisor", "Other"],
    btnSubmitRequest: "Submit Request",
    btnClearRequest: "Clear Form",
    alertEmptyLogin: "Please enter email and password",
    alertInvalidLoginEmail: "Please enter a valid email address",
    alertLoginSuccess: "Login Successful",
    alertLoginFail: "Invalid Credentials",
    alertEmptyReq: "Please fill all required fields",
    alertInvalidEmail: "Please enter a valid email address with @",
    alertWeakPassword: "Password must be at least 8 characters and include uppercase, lowercase, number, and symbol",
    alertInvalidName: "Name must contain letters only",
    alertInvalidJob: "Please select a job title",
    alertConnection: "Unable to connect to the server"
  }
};

let currentLang = localStorage.getItem("lang") || "ar";

function updateLanguage() {
  const t = translations[currentLang];

  document.documentElement.lang = currentLang;
  document.documentElement.dir = currentLang === "ar" ? "rtl" : "ltr";
  localStorage.setItem("lang", currentLang);

  const backIcon = document.getElementById("back-icon");
  backIcon.className = currentLang === "en"
    ? "fa-solid fa-arrow-right"
    : "fa-solid fa-arrow-left";

  document.getElementById("page-window-title").innerText = t.windowTitle;
  document.getElementById("langText").innerText = t.langBtn;
  document.getElementById("top-subtitle").innerText = t.topSubtitle;
  document.getElementById("page-title").innerText = t.pageTitle;
  document.getElementById("page-subtitle").innerText = t.pageSubtitle;
  document.getElementById("tab-login-btn").innerText = t.tabLoginBtn;
  document.getElementById("tab-request-btn").innerText = t.tabRequestBtn;
  document.getElementById("lbl-email").innerText = t.lblEmail;
  document.getElementById("lbl-password").innerText = t.lblPassword;
  document.getElementById("btnLogin").innerText = t.btnLogin;
  document.getElementById("lbl-name").innerHTML = t.lblName;
  document.getElementById("lbl-req-email").innerHTML = t.lblReqEmail;
  document.getElementById("lbl-code").innerHTML = t.lblCode;
  document.getElementById("lbl-dept").innerText = t.lblDept;
  document.getElementById("lbl-job").innerText = t.lblJob;
  document.getElementById("btnSubmitRequest").innerText = t.btnSubmitRequest;
  document.getElementById("btnClearRequest").innerText = t.btnClearRequest;

  const deptSelect = document.getElementById("reqDept");
  for (let i = 0; i < deptSelect.options.length; i++) {
    if (t.deptOpts[i]) {
      deptSelect.options[i].innerText = t.deptOpts[i];
    }
  }

  const jobSelect = document.getElementById("reqJob");
  for (let i = 0; i < jobSelect.options.length; i++) {
    if (t.jobOpts[i]) {
      jobSelect.options[i].innerText = t.jobOpts[i];
    }
  }

  document.getElementById("alertBox").classList.add("hidden");
}

document.getElementById("btnLang").addEventListener("click", function() {
  currentLang = currentLang === "ar" ? "en" : "ar";
  updateLanguage();
});

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.tab).classList.add("active");
    document.getElementById("alertBox").classList.add("hidden");
  };
});

function showAlert(type, msg){
  const box = document.getElementById("alertBox");
  box.className = "alert " + type;
  box.textContent = msg;
  box.classList.remove("hidden");
}

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function isStrongPassword(password) {
  return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^\w\s]).{8,}$/.test(password);
}

function isTextOnly(value) {
  return /^[A-Za-z\u0600-\u06FF\s]+$/.test(value);
}

document.getElementById("btnLogin").onclick = async () => {
  const user = document.getElementById("loginUser").value.trim();
  const pass = document.getElementById("loginPass").value.trim();
  const t = translations[currentLang];

  if(!user || !pass){
    showAlert("danger", t.alertEmptyLogin);
    return;
  }

  if(!isValidEmail(user)){
    showAlert("danger", t.alertInvalidLoginEmail);
    return;
  }

  try{
    const res = await fetch(`${API_URL}/auth/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: user,
        password: pass
      })
    });

    const data = await res.json();
    console.log("login response:", data);

    if(data.success){
      localStorage.setItem("authToken", data.token);
      localStorage.setItem("currentUser", JSON.stringify(data.user));
      localStorage.setItem("userRole", data.user.role);
      localStorage.setItem("lang", currentLang);

      showAlert("success", t.alertLoginSuccess);

      window.location.assign("./connect.html");
      return;
   } else if (data.status === "pending") {
  showAlert("danger", currentLang === "ar"
    ? "طلبك لا يزال قيد مراجعة المسؤول."
    : "Your request is still pending admin approval."
  );
} else if (data.status === "rejected") {
  showAlert("danger", currentLang === "ar"
    ? "تم رفض طلبك من قبل المسؤول."
    : "Your request has been rejected."
  );
} else {
  showAlert("danger", data.message || t.alertLoginFail);
}
  } catch (e){
    console.error("login error:", e);
    showAlert("danger", t.alertConnection);
  }
};

document.getElementById("btnSubmitRequest").onclick = async () => {
  const name = document.getElementById("reqName").value.trim();
  const email = document.getElementById("reqEmail").value.trim();
  const code = document.getElementById("reqCode").value.trim();
  const dept = document.getElementById("reqDept").value;
  const job = document.getElementById("reqJob").value.trim();
  const t = translations[currentLang];
  const submitBtn = document.getElementById("btnSubmitRequest");

  if(!name || !email || !code){
    showAlert("danger", t.alertEmptyReq);
    return;
  }

  if(!isTextOnly(name)){
    showAlert("danger", t.alertInvalidName);
    return;
  }

  if(!isValidEmail(email) || !email.includes("@")){
    showAlert("danger", t.alertInvalidEmail);
    return;
  }

  if(!isStrongPassword(code)){
    showAlert("danger", t.alertWeakPassword);
    return;
  }

  if(!job){
    showAlert("danger", t.alertInvalidJob);
    return;
  }

  submitBtn.disabled = true;
  submitBtn.style.opacity = "0.7";

  try{
    const res = await fetch(`${API_URL}/auth/register-request`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: name,
        email: email,
        password: code,
        job_title: job,
        department: dept
      })
    });

    const data = await res.json();
    console.log("register-request response:", data);

    if(data.success){
      const requestId = data.request_id || data.id || "";
      localStorage.setItem("lastRequestId", String(requestId));
      localStorage.setItem("lang", currentLang);

window.location.href = "pending.html";      return;
    } else {
      showAlert("danger", data.message || t.alertLoginFail);
    }
  } catch (e){
    console.error("register request error:", e);
    showAlert("danger", t.alertConnection);
  } finally {
    submitBtn.disabled = false;
    submitBtn.style.opacity = "1";
  }
};

document.getElementById("btnClearRequest").onclick = () => {
  ["reqName","reqEmail","reqCode","reqDept","reqJob"].forEach(id => {
    document.getElementById(id).value = "";
  });
  document.getElementById("alertBox").classList.add("hidden");
};

updateLanguage();
</script>

</body>
</html>
