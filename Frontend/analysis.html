<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whisper-WA | التحليل</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary-dark:#1f5f3b;
      --primary-mid:#3f9b5f;
      --primary-light:#5fbf7a;
      --accent-glow:#8fd9a8;
      --bg-dark:#0e1a12;
      --glass-bg: rgba(20, 40, 30, 0.65);
      --glass-border: rgba(95, 191, 122, 0.3);
      --text-white:#ffffff;
      --text-muted:#c2dec9;
      --danger:#ff6b6b;
      --warning:#ffd166;
      --info:#7dd3fc;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }

    body{
      font-family:'Tajawal',sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-white);
      min-height:100vh;
      overflow-x:hidden;
      background-image:
        linear-gradient(rgba(31, 95, 59, 0.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31, 95, 59, 0.10) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .animated-bg-logo{
      position: fixed;
      top:50%;
      left:50%;
      transform: translate(-50%,-50%);
      z-index:-1;
      width: 650px;
      pointer-events:none;
      opacity:0.18;
      animation: cyberGlowPulse 8s ease-in-out infinite alternate;
    }

    .animated-bg-logo img{
      width:100%;
      height:auto;
      filter: drop-shadow(0 0 30px var(--primary-mid));
    }

    @keyframes cyberGlowPulse{
      0%{ opacity:0.12; transform: translate(-50%,-50%) scale(0.95); }
      100%{ opacity:0.32; transform: translate(-50%,-50%) scale(1.05); }
    }

    .main-container{
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px;
      display:flex;
      flex-direction:column;
      gap: 18px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .panel{
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(14px);
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      padding: 16px;
      overflow:hidden;
    }

    .panel-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .panel-title h4{
      font-size: 1rem;
      color: var(--primary-light);
      display:inline-flex;
      align-items:center;
      gap: 10px;
    }

    .muted{
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height:1.7;
    }

    .stat-grid{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    @media(max-width: 980px){
      .stat-grid{ grid-template-columns: repeat(2, 1fr); }
    }

    @media(max-width: 560px){
      .stat-grid{ grid-template-columns: 1fr; }
    }

    .stat{
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .stat .label{
      color: var(--text-muted);
      font-size: 0.82rem;
    }

    .stat .value{
      font-size: 1.25rem;
      font-weight: 700;
    }

    .stat .sub{
      color: rgba(255,255,255,0.75);
      font-size: 0.82rem;
      white-space: normal;
      line-height: 1.7;
    }

    .risk-card{
      border-color: rgba(255,255,255,0.10);
    }

    .risk-danger{
      border-color: rgba(255, 77, 77, 0.35);
      background: rgba(255, 77, 77, 0.08);
    }

    .risk-warn{
      border-color: rgba(255, 193, 7, 0.35);
      background: rgba(255, 193, 7, 0.08);
    }

    .risk-ok{
      border-color: rgba(95,191,122,0.28);
      background: rgba(95,191,122,0.08);
    }

    .list{
      display:flex;
      flex-direction:column;
      gap: 10px;
      max-height: 320px;
      overflow:auto;
      padding-left: 2px;
    }

    .item{
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 12px;
      display:flex;
      flex-direction:column;
      gap: 6px;
    }

    .item.danger-border{ border-color: rgba(255,77,77,0.24); }
    .item.warn-border{ border-color: rgba(255,193,7,0.24); }
    .item.ok-border{ border-color: rgba(95,191,122,0.24); }

    .item .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--accent-glow);
      background: rgba(95,191,122,0.12);
      white-space: nowrap;
    }

    button.pill{
      cursor:pointer;
      font-family:'Tajawal',sans-serif;
    }

    button.pill:hover{
      filter:brightness(1.15);
      transform: translateY(-1px);
    }


    .danger{
      background: rgba(255, 77, 77, 0.12);
      color:#ffd0d0;
      border-color: rgba(255,77,77,0.25);
    }

    .warn{
      background: rgba(255, 193, 7, 0.12);
      color:#ffe7a6;
      border-color: rgba(255,193,7,0.25);
    }

    .ok{
      background: rgba(95,191,122,0.12);
      color:#d8ffe4;
      border-color: rgba(95,191,122,0.25);
    }

    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.88);
      overflow-wrap:anywhere;
    }

    .reason-list{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:4px;
    }

    .reason{
      font-size:0.75rem;
      padding:4px 8px;
      border-radius:999px;
      color:#d8ffe4;
      background:rgba(95,191,122,0.10);
      border:1px solid rgba(95,191,122,0.20);
    }

    .url-spoof-note{
      color:#ffd0d0;
      font-size:0.8rem;
      line-height:1.7;
      margin-top:4px;
    }

    .col-12{ grid-column: span 12; }
    .col-6{ grid-column: span 6; }

    @media(max-width: 980px){
      .col-6{ grid-column: span 12; }
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: #5fbf7a rgba(20, 40, 30, 0.4);
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track {
      background: rgba(20, 40, 30, 0.4);
      border-radius: 20px;
    }
    ::-webkit-scrollbar-thumb {
      background: #5fbf7a;
      border-radius: 20px;
      border: 2px solid rgba(20, 40, 30, 0.7);
    }
    ::-webkit-scrollbar-thumb:hover { background: #8fd9a8; }
  </style>
</head>

<body>
  <div class="animated-bg-logo">
    <img src="logo.png" alt="Background Logo">
  </div>

  <div class="main-container">
    <div id="header-placeholder"></div>

    <div class="grid">
      <section class="panel col-12">
        <div class="panel-title">
          <h4><i class="fa-solid fa-chart-simple"></i> <span id="txt-summary-title">ملخص عام</span></h4>
        </div>
        <div class="stat-grid" id="summaryStats"></div>
      </section>

      <section class="panel col-6">
        <div class="panel-title">
          <h4><i class="fa-solid fa-clock"></i> <span id="txt-activity-title">نمط النشاط</span></h4>
        </div>
        <div class="list" id="activityList"></div>
      </section>

      <section class="panel col-6">
        <div class="panel-title">
          <h4><i class="fa-solid fa-triangle-exclamation" style="color:#ff4d4d;"></i> <span id="txt-flags-title">المؤشرات الجنائية</span></h4>
        </div>
        <div class="list" id="flagsList"></div>
      </section>

      <section class="panel col-6">
        <div class="panel-title">
          <h4><i class="fa-solid fa-share-nodes"></i> <span id="txt-flow-title">تسلسل المحادثة المشبوه</span></h4>
        </div>
        <div class="list" id="flowList"></div>
      </section>

      <section class="panel col-6">
        <div class="panel-title">
          <h4><i class="fa-solid fa-bullseye"></i> <span id="txt-topmsg-title">أكثر رسالة مشبوهة</span></h4>
        </div>
        <div class="list" id="topMessageList"></div>
      </section>

      <section class="panel col-12">
        <div class="panel-title">
          <h4><i class="fa-solid fa-link"></i> <span id="txt-urls-title">الروابط المستخرجة</span></h4>
          <span class="pill" id="urlsCountPill">0</span>
        </div>
        <div class="list" id="urlsList" style="max-height:360px;"></div>
      </section>

      <section class="panel col-12">
        <div class="panel-title">
          <h4><i class="fa-solid fa-magnifying-glass"></i> <span id="txt-keywords-title">الكلمات المشبوهة</span></h4>
          <span class="muted" id="txt-keywords-note">مرات الظهور</span>
        </div>
        <div class="list" id="keywordsList"></div>
      </section>

      <section class="panel col-12">
        <div class="panel-title">
          <h4><i class="fa-solid fa-lightbulb"></i> <span id="txt-rec-title">التوصيات</span></h4>
        </div>
        <div class="list" id="recommendationsList"></div>
      </section>
    </div>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:5000";

    let currentLang = localStorage.getItem("lang") || "ar";
    let analysisLoaded = false;
    let analysisLoading = false;

    const caseId =
      new URLSearchParams(window.location.search).get("case_id") ||
      localStorage.getItem("CURRENT_CASE_ID") ||
      localStorage.getItem("case_id") ||
      "";

    const UI = {
      ar: {
        title: "Whisper-WA | التحليل",
        topSubtitle: "منصة التحليل الجنائي الرقمي",
        summaryTitle: "ملخص عام",
        activityTitle: "نمط النشاط",
        flagsTitle: "المؤشرات الجنائية",
        flowTitle: "تسلسل المحادثة المشبوه",
        topMsgTitle: "أكثر رسالة مشبوهة",
        recTitle: "التوصيات",
        urlsTitle: "الروابط المستخرجة",
        numbersTitle: "الأرقام المستخرجة",
        keywordsTitle: "الكلمات المشبوهة",
        keywordsNote: "مرات الظهور",
        s_total: "عدد الرسائل",
        s_first: "أول تواصل",
        s_last: "آخر تواصل",
        s_summary: "ملخص التحليل",
        s_sent: "مرسل",
        s_recv: "مستلم",
        s_risk: "تقييم الخطورة",
        s_spoofing: "روابط مزيفة",
        times: "مرة",
        links: "روابط",
        numbers: "أرقام",
        emails: "بريد إلكتروني",
        keywords: "كلمات",
        spoofing: "انتحال",
        hits: "مرات الظهور",
        a_most_contacted: "أكثر جهة تواصل",
        a_most_active: "أكثر محادثة نشاطًا",
        a_most_recent: "أحدث محادثة",
        a_peak_hour: "أكثر ساعة نشاط",
        a_peak_day: "أكثر يوم نشاط",
        a_duration: "مدة التواصل",
        p_important: "مهم",
        p_warn: "تنبيه",
        p_ok: "مقبول",
        noData: "لا توجد بيانات تحليل",
        noFlow: "لم يتم رصد تسلسل مشبوه قوي",
        noTopMessage: "لا توجد رسالة تستحق التصنيف كرسالة مشبوهة حاليًا",
        loading: "جاري تحميل التحليل...",
        failed: "فشل تحميل التحليل",
        score: "درجة الاشتباه",
        reasons: "الأسباب",
        riskHigh: "مرتفع",
        riskMedium: "متوسط",
        riskLow: "منخفض",
        riskClean: "لا توجد مؤشرات قوية",
        possibleSpoof: "اشتباه انتحال",
        resembles: "يشبه"
      },
      en: {
        title: "Whisper-WA | Analysis",
        topSubtitle: "Digital Forensics Platform",
        summaryTitle: "Overview",
        activityTitle: "Activity Pattern",
        flagsTitle: "Forensic Indicators",
        flowTitle: "Suspicious Conversation Flow",
        topMsgTitle: "Top Suspicious Message",
        recTitle: "Recommendations",
        urlsTitle: "Extracted URLs",
        numbersTitle: "Extracted Numbers",
        keywordsTitle: "Suspicious Keywords",
        keywordsNote: "Occurrences",
        s_total: "Total Messages",
        s_first: "First Contact",
        s_last: "Last Contact",
        s_summary: "Analysis Summary",
        s_sent: "Sent",
        s_recv: "Received",
        s_risk: "Risk Assessment",
        s_spoofing: "Spoofed URLs",
        times: "times",
        links: "URLs",
        numbers: "Numbers",
        emails: "Emails",
        keywords: "Keywords",
        spoofing: "Spoofing",
        hits: "Occurrences",
        a_most_contacted: "Most Contacted",
        a_most_active: "Most Active Chat",
        a_most_recent: "Most Recent Chat",
        a_peak_hour: "Most active hour",
        a_peak_day: "Most active day",
        a_duration: "Communication span",
        p_important: "Important",
        p_warn: "Warning",
        p_ok: "OK",
        noData: "No analysis data",
        noFlow: "No strong suspicious flow detected",
        noTopMessage: "No message currently qualifies as suspicious",
        loading: "Loading analysis...",
        failed: "Failed to load analysis",
        score: "Suspicion Score",
        reasons: "Reasons",
        riskHigh: "High",
        riskMedium: "Medium",
        riskLow: "Low",
        riskClean: "No strong indicators",
        possibleSpoof: "Possible spoofing",
        resembles: "resembles"
      }
    };

    const raw = {
      summary: {
        total_messages: 0,
        sent: 0,
        received: 0,
        first_contact: "-",
        last_contact: "-",
        urls_count: 0,
        spoofing_urls_count: 0,
        numbers_count: 0,
        emails_count: 0,
        keyword_hits_total: 0
      },
      activity: [],
      flags: [],
      flow: null,
      top_suspicious_message: null,
      recommendations: { items_ar: [], items_en: [] },
      urls: [],
      numbers: [],
      keywords: []
    };

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function setPill(el, text){
      if (el) el.textContent = text;
    }

    function getRiskInfo(){
      const t = UI[currentLang];
      const hasDanger = raw.flags.some(f => (f.level || "") === "danger");
      const hasWarn = raw.flags.some(f => (f.level || "") === "warn");
      const spoofCount = raw.summary.spoofing_urls_count || raw.urls.filter(u => u.is_spoofing).length;

      if (hasDanger || spoofCount > 0) {
        return { label: t.riskHigh, cls: "risk-danger", pill: "danger" };
      }
      if (hasWarn) {
        return { label: t.riskMedium, cls: "risk-warn", pill: "warn" };
      }
      return { label: t.riskClean, cls: "risk-ok", pill: "ok" };
    }

    function renderSummary(s){
      const t = UI[currentLang];
      const wrap = document.getElementById("summaryStats");
      wrap.innerHTML = "";

      const firstVal = s.first_contact ? String(s.first_contact).split(" ")[0] : "-";
      const lastVal = s.last_contact ? String(s.last_contact).split(" ")[0] : "-";
      const spoofCount = s.spoofing_urls_count || raw.urls.filter(u => u.is_spoofing).length;

      const detectedSummary = [
        s.urls_count ? `• ${s.urls_count} ${t.links}` : "",
        spoofCount ? `• ${spoofCount} ${t.spoofing}` : "",
        s.emails_count ? `• ${s.emails_count} ${t.emails}` : "",
        s.keyword_hits_total ? `• ${s.keyword_hits_total} ${t.keywords}` : ""
      ].filter(Boolean).join("<br>");

      const cards = [
        { label: t.s_total, value: s.total_messages ?? 0, sub: `${t.s_sent}: ${s.sent ?? 0} | ${t.s_recv}: ${s.received ?? 0}` },
        { label: t.s_first, value: firstVal, sub: s.first_contact || "-" },
        { label: t.s_last, value: lastVal, sub: s.last_contact || "-" },
        {
          label: t.s_summary,
          value: "",
          sub: detectedSummary || (currentLang === "ar" ? "لا توجد مؤشرات مستخرجة" : "No extracted indicators")
        }
      ];

      cards.forEach(c=>{
        const div = document.createElement("div");
        div.className = "stat";
        div.innerHTML = `
          <div class="label">${escapeHtml(c.label)}</div>
          <div class="value">${escapeHtml(c.value)}</div>
          <div class="sub">${c.sub || ""}</div>
        `;
        wrap.appendChild(div);
      });
    }

    function renderActivity(list){
      const t = UI[currentLang];
      const wrap = document.getElementById("activityList");
      wrap.innerHTML = "";

      const labelMap = {
        most_contacted: t.a_most_contacted,
        most_active: t.a_most_active,
        most_recent: t.a_most_recent,
        peak_hour: t.a_peak_hour,
        peak_day: t.a_peak_day,
        duration: t.a_duration
      };

      if (!Array.isArray(list) || !list.length) {
        wrap.innerHTML = `<div class="muted">${t.noData}</div>`;
        return;
      }

      list
        .filter(r => r.id !== "ratio")
        .forEach(r=>{
          const div = document.createElement("div");
          div.className = "item";
          const val = (currentLang === "ar") ? (r.value_ar || r.value || "-") : (r.value_en || r.value || "-");
          div.innerHTML = `
            <div class="row">
              <span class="mono">${escapeHtml(labelMap[r.id] || r.label || r.id || "-")}</span>
              <span class="pill ok">${escapeHtml(val)}</span>
            </div>
          `;
          wrap.appendChild(div);
        });
    }

    function renderFlags(flags){
      const t = UI[currentLang];
      const wrap = document.getElementById("flagsList");
      wrap.innerHTML = "";

      if (!Array.isArray(flags) || !flags.length) {
        wrap.innerHTML = `<div class="muted">${t.noData}</div>`;
        return;
      }

      flags.forEach(f=>{
        const level = f.level || "ok";
        const pillClass = level === "danger" ? "danger" : (level === "warn" ? "warn" : "ok");
        const pillText = level === "danger" ? t.p_important : (level === "warn" ? t.p_warn : t.p_ok);
        const title = (currentLang === "ar") ? (f.title_ar || f.title || "-") : (f.title_en || f.title || "-");
        const desc  = (currentLang === "ar") ? (f.desc_ar || f.description || f.desc || "-") : (f.desc_en || f.description || f.desc || "-");

        const div = document.createElement("div");
        div.className = `item ${level === "danger" ? "danger-border" : level === "warn" ? "warn-border" : "ok-border"}`;
        div.innerHTML = `
          <div class="row">
            <span class="mono"><b>${escapeHtml(title)}</b></span>
            <span class="pill ${pillClass}">${escapeHtml(pillText)}</span>
          </div>
          <div class="muted">${escapeHtml(desc)}</div>
        `;
        wrap.appendChild(div);
      });
    }

    function renderFlow(flow){
      const t = UI[currentLang];
      const wrap = document.getElementById("flowList");
      wrap.innerHTML = "";

      if (!flow){
        wrap.innerHTML = `<div class="muted">${t.noFlow}</div>`;
        return;
      }

      const level = flow.level || "warn";
      const text = currentLang === "ar" ? (flow.text_ar || "-") : (flow.text_en || "-");

      const div = document.createElement("div");
      div.className = `item ${level === "danger" ? "danger-border" : "warn-border"}`;
      div.innerHTML = `
        <div class="row">
          <span class="mono"><b>${escapeHtml(text)}</b></span>
        </div>
      `;
      wrap.appendChild(div);
    }

    function renderTopMessage(msg){
      const t = UI[currentLang];
      const wrap = document.getElementById("topMessageList");
      wrap.innerHTML = "";

      if (!msg){
        wrap.innerHTML = `<div class="muted">${t.noTopMessage}</div>`;
        return;
      }

      const preview = currentLang === "ar"
        ? (msg.text_preview_ar || msg.text_preview || "-")
        : (msg.text_preview_en || msg.text_preview || "-");

      const rawReasons = currentLang === "ar"
        ? (msg.reasons_ar || [])
        : (msg.reasons_en || []);

      const reasons = rawReasons
        .filter(r => !String(r).toLowerCase().includes("external url") && !String(r).includes("رابط خارجي"))
        .slice(0, 2);

      const div = document.createElement("div");
      div.className = "item danger-border";
      div.innerHTML = `
        <div class="row">
          <button type="button" class="pill ok" onclick="goToMessage('${escapeHtml(msg.message_id || "")}')">
            <i class="fa-solid fa-location-arrow"></i>
            ${currentLang === "ar" ? "اذهب للرسالة" : "Go to Message"}
          </button>
        </div>
        <div class="muted">${escapeHtml(preview)}</div>
        ${reasons.length ? `
          <div class="reason-list">
            ${reasons.map(r => `<span class="reason">${escapeHtml(r)}</span>`).join("")}
          </div>
        ` : ""}
      `;
      wrap.appendChild(div);
    }

    function renderRecommendations(data){
      const t = UI[currentLang];
      const wrap = document.getElementById("recommendationsList");
      wrap.innerHTML = "";

      const items = currentLang === "ar"
        ? (data?.items_ar || [])
        : (data?.items_en || []);

      if (!items.length){
        wrap.innerHTML = `<div class="muted">${t.noData}</div>`;
        return;
      }

      items.forEach(text=>{
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `<div class="muted">• ${escapeHtml(text)}</div>`;
        wrap.appendChild(div);
      });
    }

    function renderUrls(urls){
      const t = UI[currentLang];
      const wrap = document.getElementById("urlsList");
      wrap.innerHTML = "";

      setPill(document.getElementById("urlsCountPill"), `${(urls || []).length} ${t.links}`);

      if(!Array.isArray(urls) || !urls.length){
        wrap.innerHTML = `<div class="muted">${currentLang==="ar" ? "لا توجد روابط." : "No URLs found."}</div>`;
        return;
      }

      urls.forEach(u=>{
        const value = u.url || u.value || u.link || "-";
        const count = u.count || u.hits || 1;
        const isSpoof = Boolean(u.is_spoofing);
        const div = document.createElement("div");
        div.className = `item ${isSpoof ? "danger-border" : ""}`;
        div.innerHTML = `
          <div class="mono">${escapeHtml(value)}</div>
          <div class="row" style="justify-content:flex-end;">
            <span class="pill ${isSpoof ? "danger" : ""}">
              ${isSpoof ? escapeHtml(t.possibleSpoof) : `${count} ${escapeHtml(t.times)}`}
            </span>
          </div>
          ${isSpoof ? `
            <div class="url-spoof-note">
              <i class="fa-solid fa-triangle-exclamation"></i>
              ${escapeHtml(u.spoofing_suspicious_domain || u.domain || "")}
              ${escapeHtml(t.resembles)}
              <b>${escapeHtml(u.spoofing_resembles || "")}</b>
            </div>
          ` : ""}
        `;
        wrap.appendChild(div);
      });
    }

    function renderKeywords(keys){
      const t = UI[currentLang];
      const wrap = document.getElementById("keywordsList");
      wrap.innerHTML = "";

      if(!Array.isArray(keys) || !keys.length){
        wrap.innerHTML = `<div class="muted">${t.noData}</div>`;
        return;
      }

      keys.forEach(k=>{
        const div = document.createElement("div");
        div.className = "item";

        const keyword = k.keyword || k.value || "-";
        const hits = k.hits || k.count || 1;

        div.innerHTML = `
          <div class="row">
            <span class="mono"><b>${escapeHtml(keyword)}</b></span>
            <span class="pill">${hits} ${escapeHtml(t.hits)}</span>
          </div>
        `;
        wrap.appendChild(div);
      });
    }

    function renderAll(){
      renderSummary(raw.summary);
      renderActivity(raw.activity);
      renderFlags(raw.flags);
      renderFlow(raw.flow);
      renderTopMessage(raw.top_suspicious_message);
      renderRecommendations(raw.recommendations);
      renderUrls(raw.urls);
      renderKeywords(raw.keywords);
    }

    function applyLangToHeaderAndPage(){
      const t = UI[currentLang];
      const html = document.documentElement;

      html.lang = currentLang;
html.dir = "rtl";
document.body.dir = "rtl";      document.title = t.title;

      const topSubtitle = document.getElementById("top-subtitle");
      const langText = document.getElementById("langText");
      if (topSubtitle) topSubtitle.textContent = t.topSubtitle;
      if (langText) langText.textContent = (currentLang === "en") ? "AR" : "EN";

      const ids = {
        "txt-summary-title": t.summaryTitle,
        "txt-activity-title": t.activityTitle,
        "txt-flags-title": t.flagsTitle,
        "txt-flow-title": t.flowTitle,
        "txt-topmsg-title": t.topMsgTitle,
        "txt-rec-title": t.recTitle,
        "txt-urls-title": t.urlsTitle,
        "txt-keywords-title": t.keywordsTitle,
        "txt-keywords-note": t.keywordsNote
      };

      Object.entries(ids).forEach(([id, text]) => {
        const el = document.getElementById(id);
        if (el) el.textContent = text;
      });
    }

    function normalizeAnalysisResponse(data){
      const summary = data.summary || data.overview || {};

      raw.summary.total_messages = summary.total_messages ?? summary.total ?? data.total_messages ?? 0;
      raw.summary.sent = summary.sent ?? summary.sent_messages ?? data.sent ?? 0;
      raw.summary.received = summary.received ?? summary.received_messages ?? data.received ?? 0;
      raw.summary.first_contact = summary.first_contact ?? summary.first_message_time ?? data.first_contact ?? "-";
      raw.summary.last_contact = summary.last_contact ?? summary.last_message_time ?? data.last_contact ?? "-";
      raw.summary.urls_count = summary.urls_count ?? ((data.urls || data.extracted_urls || []).length) ?? 0;
      raw.summary.spoofing_urls_count = summary.spoofing_urls_count ?? 0;
      raw.summary.numbers_count = summary.numbers_count ?? ((data.numbers || data.extracted_numbers || []).length) ?? 0;
      raw.summary.emails_count = summary.emails_count ?? ((data.emails || data.extracted_emails || []).length) ?? 0;
      raw.summary.keyword_hits_total = summary.keyword_hits_total ?? summary.keywords_total ?? 0;

      raw.activity = data.activity || data.activity_pattern || [];
      raw.flags = data.flags || data.indicators || data.initial_flags || [];
      raw.flow = data.flow || null;
      raw.top_suspicious_message = data.top_suspicious_message || null;
      raw.recommendations = data.recommendations || { items_ar: [], items_en: [] };
      raw.urls = data.urls || data.extracted_urls || [];
      raw.numbers = data.numbers || data.extracted_numbers || [];
      raw.keywords = data.keywords || data.keyword_hits || [];

      if (!raw.summary.spoofing_urls_count) {
        raw.summary.spoofing_urls_count = raw.urls.filter(u => u.is_spoofing).length;
      }
    }

    function fillAllAsNoData(message){
      [
        "summaryStats", "activityList", "flagsList", "flowList", "topMessageList",
        "recommendationsList", "urlsList", "keywordsList"
      ].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = `<div class="muted">${message}</div>`;
      });
    }

    async function loadRealAnalysis() {
      const t = UI[currentLang];

      if (analysisLoading || analysisLoaded) return;

      if (!caseId) {
        fillAllAsNoData(t.noData);
        return;
      }

      analysisLoading = true;
      document.getElementById("summaryStats").innerHTML = `<div class="muted">${t.loading}</div>`;

      try {
        const res = await fetch(`${API_BASE}/api/analysis/${caseId}`, { cache: "no-store" });
        const data = await res.json();

        if (!res.ok || !data.ok) {
          fillAllAsNoData(`${t.failed}: ${data.error || ""}`);
          return;
        }

        normalizeAnalysisResponse(data);
        renderAll();
        analysisLoaded = true;

      } catch (e) {
        console.error("Analysis load failed:", e);
        fillAllAsNoData(t.failed);
      } finally {
        analysisLoading = false;
      }
    }

    async function loadHeaderOnlyOnce() {
      try {
        const res = await fetch("header.html");
        const headerHtml = await res.text();
        const holder = document.getElementById("header-placeholder");

        if (holder) {
          const temp = document.createElement("div");
          temp.innerHTML = headerHtml;

          const scripts = temp.querySelectorAll("script");
          scripts.forEach(s => s.remove());

          holder.innerHTML = "";
         holder.append(...temp.childNodes);

        const backBtn = document.getElementById("btnBack");

          btnLang.onclick = () => {
            currentLang = (currentLang === "ar") ? "en" : "ar";

            applyLangToHeaderAndPage();
            renderAll();
          };

      } catch (e) {
        console.error("Header load failed:", e);

    function goToMessage(messageId) {
      if (!messageId) return;

      localStorage.setItem("FOCUS_MESSAGE_ID", String(messageId));
      window.location.href = `chat.html?case_id=${encodeURIComponent(caseId)}&focus=${encodeURIComponent(messageId)}`;
    }

    window.addEventListener("DOMContentLoaded", async () => {
      applyLangToHeaderAndPage();
      await loadHeaderOnlyOnce();
      applyLangToHeaderAndPage();
      await loadRealAnalysis();
    }, { once: true });
  </script>
