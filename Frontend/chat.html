<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whisper-WA | بناء التقرير</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-dark: #1f5f3b;
      --primary-mid: #3f9b5f;
      --primary-light: #5fbf7a;
      --accent-glow: #8fd9a8;
      --bg-dark: #0e1a12;
      --glass-bg: rgba(20, 40, 30, 0.65);
      --glass-border: rgba(95, 191, 122, 0.3);
      --text-white: #ffffff;
      --text-muted: #c2dec9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Tajawal', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-white);
      height: 100vh;
      overflow: hidden;
      background-image:
        linear-gradient(rgba(31, 95, 59, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31, 95, 59, 0.1) 1px, transparent 1px);
      background-size: 40px 40px;
      direction: rtl;
      position: relative;
    }

    .main-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 25px;
      gap: 20px;
      position: relative;
      z-index: 10 !important;
    }

    .workspace-grid {
      display: flex;
      flex: 1;
      gap: 20px;
      overflow: hidden;
      position: relative;
      z-index: 10;
    }

    .report-sidebar {
      width: auto;
      flex: 1.25;
      min-width: 420px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 10px;
    }

    .sidebar-header h3 { font-size: 1.1rem; color: var(--primary-light); }

    .sidebar-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn-secondary {
      background: rgba(95, 191, 122, 0.12);
      border: 1px solid rgba(95, 191, 122, 0.35);
      color: var(--accent-glow);
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Tajawal';
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      transition: 0.25s;
      white-space: nowrap;
    }

    .btn-secondary:hover {
      background: rgba(63, 155, 95, 0.35);
      border-color: rgba(95, 191, 122, 0.6);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(45deg, var(--primary-dark), var(--primary-mid));
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-family: 'Tajawal';
      font-size: 0.95rem;
      display: flex;
      justify-content: center;
      gap: 8px;
      align-items: center;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(31, 95, 59, 0.3);
    }

    .btn-primary:hover { filter: brightness(1.2); transform: scale(1.02); }
    .mb-10 { margin-bottom: 20px; }

    .report-table-wrap {
      flex: 1;
      overflow: auto;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.18);
    }

    .report-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 620px;
    }

    .report-table thead th {
      position: sticky;
      top: 0;
      background: rgba(20, 40, 30, 0.95);
      color: var(--primary-light);
      font-size: 0.85rem;
      text-align: right;
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      z-index: 2;
    }

    .report-table tbody td {
      padding: 12px 10px;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      color: var(--text-white);
      vertical-align: top;
    }

    .report-table tbody tr:hover {
      background: rgba(95, 191, 122, 0.08);
    }

    .cell-msg { white-space: normal; line-height: 1.4; }

    .badge-type {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .badge-sent { background: rgba(63,155,95,0.22); color: #d8ffe4; }
    .badge-recv { background: rgba(44,62,80,0.35); color: #d7e6ff; }

    .chat-interface {
      flex: 1;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    .search-area {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.1);
    }

    .case-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(95, 191, 122, 0.12);
      border: 1px solid rgba(95, 191, 122, 0.25);
      color: var(--text-white);
    }

    .case-banner-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
.case-banner-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-picker-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.user-picker-box {
  width: min(460px, 92vw);
  max-height: 80vh;
  overflow: hidden;
  background: rgba(20, 40, 30, 0.97);
  border: 1px solid rgba(95, 191, 122, 0.35);
  border-radius: 18px;
  box-shadow: 0 10px 35px rgba(0,0,0,0.35);
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.user-picker-box h3 {
  color: var(--primary-light);
  font-size: 1rem;
}

.user-picker-input {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--glass-border);
  padding: 10px 14px;
  border-radius: 10px;
  color: white;
  outline: none;
  font-family: 'Tajawal';
}

.user-results {
  max-height: 260px;
  overflow-y: auto;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.18);
}

.user-item {
  padding: 12px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  cursor: pointer;
  transition: 0.2s;
}

.user-item:hover,
.user-item.active {
  background: rgba(95, 191, 122, 0.14);
}

.user-item-name {
  font-weight: 700;
  color: white;
}

.user-item-email {
  font-size: 0.82rem;
  color: var(--text-muted);
  direction: ltr;
  text-align: left;
}

.user-picker-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
    .case-banner i {
      color: var(--accent-glow);
    }

    .case-title {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .case-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .search-input-wrapper {
      position: relative;
      margin-bottom: 15px;
    }

    .search-input-wrapper input {
      width: 80%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border);
      padding: 10px 40px 10px 15px;
      border-radius: 10px;
      color: white;
      outline: none;
      font-family: 'Tajawal';
      font-size: 0.95rem;
    }

    .search-input-wrapper > i {
      position: absolute;
      right: 15px;
      top: 16px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-suggestions {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 80%;
      max-height: 280px;
      overflow-y: auto;
      background: rgba(20, 40, 30, 0.97);
      border: 1px solid rgba(95, 191, 122, 0.25);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
      display: none;
      z-index: 100;
    }

    .search-suggestions.show {
      display: block;
    }

    .suggestion-item {
      padding: 10px 14px;
      cursor: pointer;
      color: var(--text-white);
      font-size: 0.9rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover {
      background: rgba(95, 191, 122, 0.14);
    }

    .suggestion-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .suggestion-left i {
      position: static;
      color: var(--accent-glow);
      font-size: 0.8rem;
    }

    .suggestion-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      direction: ltr;
      text-align: left;
    }

    .suggestion-type {
      color: var(--text-muted);
      font-size: 0.75rem;
      white-space: nowrap;
    }

.tags-row {
  display: flex;
  gap: 6px;          /* 👈 صغّر المسافة */
  flex-wrap: nowrap; /* 👈 صف واحد */
  justify-content: space-between; /* 👈 يوزعهم */
}

   .tag {
  background: rgba(95, 191, 122, 0.15);
  padding: 4px 8px;        /* 👈 أصغر */
  border-radius: 16px;
  font-size: 0.72rem;      /* 👈 أصغر خط */
  color: var(--accent-glow);
  border: 1px solid rgba(95, 191, 122, 0.3);
  cursor: pointer;
  transition: 0.2s;

  flex: 1;                 /* 👈 يخليهم يتمددون */
  text-align: center;
  white-space: nowrap;     /* 👈 يمنع النزول */
}

    .tag:hover {
      background: var(--primary-mid);
      color: white;
    }

    .tag.active-tag {
      background: var(--primary-mid);
      color: white;
    }

    .chat-split-view {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .chat-list {
      width: 260px;
      border-left: 1px solid rgba(255,255,255,0.1);
      overflow-y: auto;
      background: rgba(0,0,0,0.1);
    }

    .chat-item {
      padding: 14px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      gap: 10px;
      align-items: flex-start;
      cursor: pointer;
      transition: 0.2s;
    }

    .chat-item:hover, .chat-item.active {
      background: rgba(95, 191, 122, 0.1);
      border-right: 4px solid var(--primary-light);
    }

    .chat-item input[type="checkbox"]{
      margin-top: 4px;
      accent-color: var(--primary-light);
      cursor: pointer;
    }

    .chat-info h4 {
      font-size: 0.98rem;
      margin-bottom: 6px;
      color: white;
      line-height: 1.2;
      word-break: break-word;
    }

    .chat-info p {
      font-size: 0.83rem;
      color: var(--text-muted);
      word-break: break-word;
    }

    .time {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-right: auto;
      white-space: nowrap;
    }

    .message-view {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      background-blend-mode: overlay;
      background-color: rgba(14, 26, 18, 0.9);
      scroll-behavior: smooth;
    }

    .msg {
      padding: 10px 15px;
      border-radius: 12px;
      max-width: 75%;
      font-size: 0.95rem;
      position: relative;
      line-height: 1.5;
      cursor: pointer;
      user-select: none;
      transition: 0.2s;
      border: 1px solid transparent;
      word-break: break-word;
    }

    .msg.received {
      background: #202c33;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
      color: white;
    }

    .msg.sent {
      background: var(--primary-dark);
      align-self: flex-start;
      border-bottom-left-radius: 2px;
      border: 1px solid var(--primary-mid);
      color: white;
    }

    .msg.selected {
      border-color: var(--accent-glow);
      box-shadow: 0 0 0 2px rgba(143, 217, 168, 0.25);
      transform: translateY(-1px);
    }

    .msg.focused-hit {
      box-shadow: 0 0 0 2px rgba(167, 243, 176, 0.45);
      border-color: #a7f3b0;
    }

    .msg-time {
      display: block;
      font-size: 0.7rem;
      margin-top: 5px;
      opacity: 0.7;
      text-align: left;
    }

    .msg mark.search-hit {
      background: #a7f3b0;
      color: #062016;
      padding: 0 4px;
      border-radius: 4px;
      font-weight: 700;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 180px;
      color: var(--text-muted);
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.8;
    }

    .animated-bg-logo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -5 !important;
      width: 600px;
      pointer-events: none;
      opacity: 0.2;
      animation: cyberGlowPulse 8s ease-in-out infinite alternate;
    }

    .animated-bg-logo img {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 0 30px var(--primary-mid));
    }

    @keyframes cyberGlowPulse {
      0% { opacity: 0.15; transform: translate(-50%, -50%) scale(0.95); }
      100% { opacity: 0.35; transform: translate(-50%, -50%) scale(1.05); }
    }


    /* ===== Professional Green Scrollbar ===== */
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(95, 191, 122, 0.85) rgba(6, 25, 16, 0.65);
    }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track {
      background: rgba(6, 25, 16, 0.65);
      border-radius: 999px;
      border: 1px solid rgba(95, 191, 122, 0.12);
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(95, 191, 122, 0.95), rgba(31, 95, 59, 0.95));
      border-radius: 999px;
      border: 2px solid rgba(6, 25, 16, 0.85);
      box-shadow: none;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(143, 217, 168, 0.95), rgba(63, 155, 95, 0.95));
    }
    .msg mark.entity-hit { background: rgba(255, 210, 77, 0.95); color: #102015; padding: 0 4px; border-radius: 4px; font-weight: 800; }
    .msg mark.url-hit { background: rgba(78, 181, 255, 0.95); color: #061724; padding: 0 4px; border-radius: 4px; font-weight: 800; }
    .msg mark.danger-hit { background: rgba(255, 95, 95, 0.95); color: white; padding: 0 4px; border-radius: 4px; font-weight: 800; }
    .msg mark.foreign-hit { background: rgba(185, 130, 255, 0.95); color: white; padding: 0 4px; border-radius: 4px; font-weight: 800; }

  </style>
</head>
<div class="animated-bg-logo">
    <img src="logo.png" alt="Background Logo">
  </div>

  <div class="main-container">
    <div id="header-placeholder"></div>

    <div class="workspace-grid">
      <aside class="glass-panel report-sidebar">
        <div class="sidebar-header">
<h3 id="txt-draft-title">
  <i class="fa-solid fa-shield-halved"></i> تقرير الأدلة
</h3>
          <div class="sidebar-actions">
            <button class="btn-secondary" id="btn-export" type="button">
              <i class="fa-solid fa-file-arrow-down"></i> <span id="txt-export">تنزيل التقرير</span>
            </button>

            <a class="btn-secondary" id="btn-analysis" href="analysis.html">
              <i class="fa-solid fa-magnifying-glass-chart"></i> <span id="txt-analysis">تحليل</span>
            </a>

            <button class="btn-secondary" id="btn-view" type="button">
              <i class="fa-solid fa-eye"></i> <span id="txt-view">عرض التقرير</span>
            </button>
          </div>
        </div>

        <button class="btn-primary full-width mb-10" id="txt-add-btn" type="button">
          <i class="fa-solid fa-plus-circle"></i> إضافة للتقرير الحالي
        </button>

        <div class="report-table-wrap">
          <table class="report-table" id="reportTable">
            <thead>
              <tr>
                <th id="th-msg">الرسالة</th>
                <th id="th-type">النوع</th>
                <th id="th-num">الرقم</th>
                <th id="th-time">التاريخ والوقت</th>
<th id="th-remove" style="cursor:pointer;">حذف</th>              </tr>
            </thead>
            <tbody id="reportTbody"></tbody>
          </table>
        </div>
      </aside>

      <section class="glass-panel chat-interface">
        <div class="search-area">
         <div class="case-banner" id="caseBanner">
            <div class="case-banner-left">
              <i id="case-icon" class="fab fa-whatsapp" style="color:#25D366;"></i>
              <div>
                <div class="case-title" id="caseTitle">جاري جلب بيانات القضية...</div>
<div class="case-subtitle" id="caseSubtitle"></div>              </div>
            </div>

            <div class="case-banner-actions">
              <button class="btn-secondary" id="btnTeamManagement" type="button">
                <i class="fa-solid fa-users-gear"></i>
                <span id="txt-team-management">Team Management</span>
              </button>
            </div>
          </div>



          <div class="search-input-wrapper">
            <i class="fa-solid fa-search"></i>
            <input type="text" id="inp-search" placeholder="بحث في المحادثات (كلمة، رقم، رابط)..." autocomplete="off">
            <div class="search-suggestions" id="searchSuggestions"></div>
          </div>

          <div class="tags-row">
            <span class="tag active-tag" data-tag="all">#All</span>

            <span class="tag" data-tag="files">#Files</span>
            <span class="tag" data-tag="images">#Images</span>
          </div>
        </div>

        <div class="chat-split-view">
          <div class="chat-list"></div>
          <div class="message-view" id="messageView"></div>
        </div>
      </section>
    </div>
  </div>
  <div class="user-picker-modal" id="userPickerModal">
  <div class="user-picker-box" style="width:min(620px, 94vw);">
    <div class="investigators-management-box" id="investigatorsBox" style="margin-top: 0; background: var(--glass-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border); display: block;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
        <div style="font-size: 0.95rem; color: var(--primary-light); font-weight: bold;">
            <i class="fa-solid fa-users-gear"></i> <span id="txt-manage-team">إدارة فريق التحقيق</span>
        </div>
        <button onclick="openAddInvestigatorPanel()" style="background: var(--primary-mid); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; transition: 0.3s;">
            <i class="fa-solid fa-user-plus"></i> <span id="txt-add-inv">إضافة محقق</span>
        </button>
    </div>
    <div id="txt-current-inv" style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px;">
        المحققون المشاركون حالياً:
    </div>
    <div id="investigatorsList" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
</div>

    <div id="addInvestigatorPanel" style="display:none; margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.1);">
      <h3 id="userPickerTitle">إضافة محقق للقضية</h3>

      <input
        type="text"
        id="userSearchInput"
        class="user-picker-input"
        placeholder="ابحث بالاسم أو الإيميل"
      >

      <div class="user-results" id="userResults"></div>

      <div class="user-picker-actions">
        <button class="btn-secondary" id="btnCancelAddUser" type="button">إلغاء</button>
        <button class="btn-primary" id="btnConfirmAddUser" type="button">إضافة</button>
      </div>
    </div>

    <div class="user-picker-actions" style="margin-top:12px;">
      <button class="btn-secondary" id="btnCloseUserPicker" type="button">إغلاق</button>
    </div>
  </div>
</div>

 <script>
    const API_BASE = "http://127.0.0.1:5000";

    let casesData = [];
    let chatsData = [];

    function detectSuggestionType(value) {
      const v = String(value || "").toLowerCase();
      if (isSpoofingText(v)) return "Spoofing";

    function extractUrls(text = "") {
      return String(text || "").match(/https?:\/\/[^\s<>()]+|www\.[^\s<>()]+/gi) || [];
    }

    function extractDomain(url = "") {
      try {
        let clean = String(url || "").trim().replace(/[),.;!?]+$/g, "");
        if (!/^https?:\/\//i.test(clean)) clean = "https://" + clean;
        return new URL(clean).hostname.toLowerCase().replace(/^www\./, "");
      } catch (e) { return ""; }
    }

    function normalizeDomainName(value = "") {
      return String(value || "")
        .toLowerCase()
        .replace(/0/g, "o").replace(/1/g, "l").replace(/3/g, "e").replace(/4/g, "a")
        .replace(/5/g, "s").replace(/7/g, "t").replace(/8/g, "b")
        .replace(/[|!]/g, "l").replace(/\$/g, "s")
        .replace(/rn/g, "m")
        .replace(/[^a-z0-9]/g, "");
    }

    function levenshtein(a, b) {
      a = String(a || ""); b = String(b || "");
      const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
      for (let i = 0; i <= a.length; i++) dp[i][0] = i;
      for (let j = 0; j <= b.length; j++) dp[0][j] = j;
      for (let i = 1; i <= a.length; i++) for (let j = 1; j <= b.length; j++) {
        const cost = a[i - 1] === b[j - 1] ? 0 : 1;
        dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);
      }
      return dp[a.length][b.length];
    }

    function getSpoofingMatch(urlOrText = "") {
      const urls = extractUrls(urlOrText);
if (!urls.length) return null;

const candidates = urls;
      for (const raw of candidates) {
        const domain = extractDomain(raw) || String(raw || "").toLowerCase();
        if (!domain || FAMOUS_DOMAINS.includes(domain)) continue;

        const domainParts = domain.split(".");
        const mainRaw = domainParts.length > 1 ? domainParts[domainParts.length - 2] : domainParts[0];
        const mainNorm = normalizeDomainName(mainRaw);
        if (!mainNorm || mainNorm.length < 3) continue;

        for (const official of FAMOUS_DOMAINS) {
          const officialParts = official.split(".");
          const officialMain = officialParts.length > 1 ? officialParts[officialParts.length - 2] : officialParts[0];
          const officialNorm = normalizeDomainName(officialMain);
          if (!officialNorm || officialNorm.length < 3) continue;

          if (domain === official || mainNorm === officialNorm) continue;

          const distance = levenshtein(mainNorm, officialNorm);
          const closeLength = Math.abs(mainNorm.length - officialNorm.length) <= 3;
          const sameStart = mainNorm[0] && mainNorm[0] === officialNorm[0];
          const containsBrand = mainNorm.includes(officialNorm) || officialNorm.includes(mainNorm);
          const typoSquat = closeLength && sameStart && distance > 0 && distance <= 2;
          const shortBrandTypo = officialNorm.length <= 5 && closeLength && distance <= 2;

          if (containsBrand || typoSquat || shortBrandTypo) {
            const brand = officialMain;
            const suggestions = FAMOUS_DOMAINS
              .filter(d => d.includes(brand) || brand.includes((d.split(".").slice(-2, -1)[0] || d.split(".")[0])))
              .slice(0, 8);
            return { suspicious: domain, resembles: official, suggestions: suggestions.length ? suggestions : [official] };
          }
        }
      }
      return null;
    }

    function isSpoofingText(text = "") { return Boolean(getSpoofingMatch(text)); }

    function textHasSuspiciousKeyword(text = "") {
      const t = String(text || "").toLowerCase();
      return SUSPICIOUS_KEYWORDS.some(k => t.includes(k.toLowerCase()));
    }

    function textHasFile(text = "") {
      return /\b\S+\.(pdf|doc|docx|xls|xlsx|ppt|pptx|zip|rar|7z|apk|exe|msi|bat|cmd|js|vbs|scr|csv|txt)\b/i.test(String(text || ""));
    }

    function extractPhoneCandidates(text = "") {
      return String(text || "").match(/(?<!\d)(?:\+|00)?\d[\d\s\-()]{6,}\d(?!\d)/g) || [];
    }

    function textHasForeignNumber(text = "") {
      return extractPhoneCandidates(text).some(raw => {
        const n = raw.replace(/[^\d+]/g, "");
        const digits = n.replace(/\D/g, "");
        if (digits.length < 8) return false;
        if (n.startsWith("+966") || digits.startsWith("00966") || digits.startsWith("966")) return false;
        if (!n.startsWith("+") && !digits.startsWith("00")) return false;
        return true;
      });
    }

      const map = new Map();

      function addSuggestion(value, type, chatId, msgId) {
        const cleaned = String(value || "").trim().replace(/[),.;!?]+$/g, "");
        if (!cleaned || !type) return;

        const key = `${type}::${cleaned.toLowerCase()}`;
        if (!map.has(key)) {
          map.set(key, {
            value: cleaned,
            type,
            count: 1,
            targets: [{ chatId, msgId }]
          });
        } else {
          const item = map.get(key);
          item.count += 1;
          if (!item.targets.some(t => String(t.chatId) === String(chatId) && String(t.msgId) === String(msgId))) {
            item.targets.push({ chatId, msgId });
          }
        }
      }

      chatsData.forEach(chat => {
        (chat.messages || []).forEach(m => {
          const text = String(m.text || "");
          const lower = text.toLowerCase();

          extractUrls(text).forEach(url => {
            addSuggestion(url, isSpoofingText(url) ? "Spoofing" : "رابط", chat.id, m.id);
          });

          extractPhoneCandidates(text).forEach(num => {
            if (textHasForeignNumber(num)) addSuggestion(num, "رقم أجنبي", chat.id, m.id);
          });

          (text.match(/\b\S+\.(pdf|doc|docx|xls|xlsx|ppt|pptx|zip|rar|7z|apk|exe|msi|bat|cmd|js|vbs|scr|csv|txt)\b/gi) || [])
            .forEach(file => addSuggestion(file, "ملف", chat.id, m.id));

            // 🔥 ملفات الميديا (PDF من واتساب وغيره)
if (m.media_url && (m.media_type === "document" || m.media_type === "file")) {
  addSuggestion(
    m.media_name || m.media_url,
    "ملف",
    chat.id,
    m.id
  );
}

          (text.match(/\b\S+\.(jpg|jpeg|png|gif|webp|bmp)\b/gi) || [])
            .forEach(img => addSuggestion(img, "صورة", chat.id, m.id));

          SUSPICIOUS_KEYWORDS.forEach(k => {
            if (lower.includes(k.toLowerCase())) addSuggestion(k, "كلمة مشبوهة", chat.id, m.id);
          });
        });
      });

      suggestionPool = Array.from(map.values()).sort((a, b) => b.count - a.count || a.value.localeCompare(b.value));
    }

    function getSuggestions(query) {
      const q = String(query || "").toLowerCase();
      let pool = suggestionPool;

      if (activeTagFilter === "url") {
        pool = pool.filter(item => item.type === "رابط");
      } else if (activeTagFilter === "spoofing") {
        pool = pool.filter(item => item.type === "Spoofing");
      } else if (activeTagFilter === "keywords") {
        pool = pool.filter(item => item.type === "كلمة مشبوهة");
      } else if (activeTagFilter === "foreign") {
        pool = pool.filter(item => item.type === "رقم أجنبي");
      } else if (activeTagFilter === "files") {
        pool = pool.filter(item => item.type === "ملف");
      } else if (activeTagFilter === "images") {
        pool = pool.filter(item => item.type === "صورة");
      }

      if (!q) return pool.slice(0, 25);
      return pool.filter(item => item.value.toLowerCase().includes(q)).slice(0, 25);
    }

    function renderSuggestions(query) {
      const suggestions = getSuggestions(query);

      if (!suggestions.length) {
        hideSuggestions();
        return;
      }

      suggestionsBox.innerHTML = "";

      suggestions.forEach(item => {
        const typeLabel = item.type || "";
        const displayTypeLabel = getTypeLabel(typeLabel);
        const row = document.createElement("div");
        row.className = "suggestion-item";
        row.innerHTML = `

          </div>
          <span class="suggestion-type">${escapeHtml(displayTypeLabel)}${item.count > 1 ? ` · ${item.count}` : ""}</span>
        `;

        row.addEventListener("click", () => {
          openDetectionResult(item);
        });

        suggestionsBox.appendChild(row);
      });

      suggestionsBox.classList.add("show");

    function openDetectionResult(item) {

      const target = item.targets && item.targets.length ? item.targets[0] : null;
      searchInput.value = item.value;
      currentSearchQuery = item.value;
      focusedMessageId = target ? target.msgId : null;
      hideSuggestions();

      const filtered = chatsData.filter(chat => chatMatchesQuery(chat, item.value));
      if (target) selectedChatId = target.chatId;
      else selectedChatId = filtered.length ? filtered[0].id : selectedChatId;

      renderChatList(filtered.length ? filtered : chatsData);
      if (selectedChatId) renderMessages(selectedChatId);
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeRegex(text) {
      return String(text).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlightText(text, query) {
      return highlightMessageContent(text, query);
    }

    function highlightByRegexOnEscaped(safeText, regex, className = "entity-hit") {
      return safeText.replace(regex, (match) => `<mark class="${className}">${match}</mark>`);
    }

    function highlightMessageContent(text, query) {
      let safeText = escapeHtml(text || "");
      const q = String(query || "").trim();
      if (q) {
        const regex = new RegExp(`(${escapeRegex(q)})`, "gi");
        return safeText.replace(regex, `<mark class="search-hit">$1</mark>`);
      }
      if (activeTagFilter === "url") return highlightByRegexOnEscaped(safeText, /(https?:\/\/[^\s<]+|www\.[^\s<]+)/gi, "url-hit");
      if (activeTagFilter === "spoofing") return highlightByRegexOnEscaped(safeText, /(https?:\/\/[^\s<]+|www\.[^\s<]+)/gi, "danger-hit");
      if (activeTagFilter === "keywords") {
        SUSPICIOUS_KEYWORDS.forEach(k => {
          safeText = safeText.replace(new RegExp(`(${escapeRegex(escapeHtml(k))})`, "gi"), `<mark class="entity-hit">$1</mark>`);
        });
        return safeText;
      }
      if (activeTagFilter === "foreign") return highlightByRegexOnEscaped(safeText, /(?:\+|00)\d[\d\s\-()]{6,}\d/g, "foreign-hit");
      if (activeTagFilter === "files") return highlightByRegexOnEscaped(safeText, /\b\S+\.(pdf|doc|docx|xls|xlsx|ppt|pptx|zip|rar|7z|apk|exe|msi|bat|cmd|js|vbs|scr|csv|txt)\b/gi, "entity-hit");
      if (activeTagFilter === "images") return highlightByRegexOnEscaped(safeText, /\b\S+\.(jpg|jpeg|png|gif|webp|bmp)\b/gi, "url-hit");
      return safeText;
    }

    function textHasUrl(text = "") { return /(https?:\/\/\S+|www\.\S+)/i.test(text); }
    function textHasImage(text = "") { return /\b\S+\.(jpg|jpeg|png|gif|webp|bmp)\b/i.test(text); }
    function textHasLocation(text = "") { return /(\b(location|gps|map|pin)\b|موقع|لوكيشن|إحداثيات|احداثيات|خريطة|-?\d{1,3}\.\d+\s*,\s*-?\d{1,3}\.\d+)/i.test(text); }

function messageMatchesTagText(msg, tag) {
  const text = String(msg?.text || "");

  if (tag === "all") return true;
  if (tag === "url") return textHasUrl(text);
  if (tag === "spoofing") return isSpoofingText(text);
  if (tag === "keywords") return textHasSuspiciousKeyword(text);
  if (tag === "foreign") return textHasForeignNumber(text);
  if (tag === "files") {
  return (
    textHasFile(text) ||
    msg?.media_type === "document" ||
    msg?.media_type === "file"
  );
}

  // 🔥 أهم تعديل
  if (tag === "images") {
    return msg?.media_type === "image" || textHasImage(text);
  }

  return true;
}

function messageMatchesCurrentFilters(m) {
  const text = String(m?.text || "");
  const mediaName = String(m?.media_name || "");
  const mediaUrl = String(m?.media_url || "");
  const q = String(currentSearchQuery || "").trim().toLowerCase();

  if (!messageMatchesTagText(m, activeTagFilter)) return false;
  if (!q) return true;

  return (
    text.toLowerCase().includes(q) ||
    mediaName.toLowerCase().includes(q) ||
    mediaUrl.toLowerCase().includes(q)
  );
}

    function chatMatchesTag(chat, tag) {
      if (tag === "all") return true;
      const texts = (chat.messages || []).map(m => m.text || "");
      return (chat.messages || []).some(m => messageMatchesTagText(m, tag));
    }

    function chatMatchesQuery(chat, q) {
      const query = String(q || "").trim();
      if (!query) return true;

      const qLower = query.toLowerCase();
      const name = (chat.name || "").toLowerCase();
      const number = (chat.number || "").toLowerCase();
      const last = (chat.last_message || "").toLowerCase();
      const messages = (chat.messages || []).map(m => (m.text || "").toLowerCase());

      const isUrlQuery = /^(https?:\/\/|www\.)/i.test(query);
      const isNumberQuery = /^[+\d][\d\s\-]{1,}$/.test(query);

      if (isUrlQuery) {
        return messages.some(t => textHasUrl(t) && t.includes(qLower));
      }

      if (activeTagFilter !== "all") {
        return (chat.messages || []).some(m => {
          const t = String(m.text || "").toLowerCase();
return messageMatchesTagText(m, activeTagFilter) && t.includes(qLower);        });
      }

      if (isNumberQuery) {
        if (number.includes(qLower)) return true;
        return messages.some(t => t.includes(qLower));
      }

      if (query.length === 1) {
        const oneCharRegex = new RegExp(escapeRegex(qLower), "i");
        if (oneCharRegex.test(name)) return true;
        if (oneCharRegex.test(number)) return true;
        if (oneCharRegex.test(last)) return true;
        return messages.some(t => oneCharRegex.test(t));
      }

      const wordRegex = new RegExp(escapeRegex(qLower), "i");
      if (wordRegex.test(name)) return true;
      if (wordRegex.test(number)) return true;
      if (wordRegex.test(last)) return true;
      return messages.some(t => wordRegex.test(t));
    }

  removeBtn.style.fontSize = "1rem";

  removeBtn.addEventListener("click", () => {
    reportRowsMap.delete(key);
    selectedMessageIds.delete(key);

    const msgId = key.split("||")[1];
    const msgBox = document.querySelector(`.msg[data-msg-id="${CSS.escape(String(msgId))}"]`);
    if (msgBox) msgBox.classList.remove("selected");

    tr.remove();
  });

  tdRemove.appendChild(removeBtn);

  tr.appendChild(tdMsg);
  tr.appendChild(tdType);
  tr.appendChild(tdNum);
  tr.appendChild(tdTime);
  tr.appendChild(tdRemove);

  tbody.appendChild(tr);
}

addBtn.addEventListener("click", () => {
  // 1) Add all messages from checked chats/numbers only when this button is clicked.
  selectedChatIds.forEach(chatId => {
    const chat = chatsData.find(c => String(c.id) === String(chatId));
    if (!chat) return;

    (chat.messages || []).forEach(m => {
      appendRow({
        key: `${chat.id}||${m.id}`,
        text: m.text,
        type: m.type,
        number: chat.number || chat.name,
        datetime: m.datetime,
        media_url: m.media_url,
        media_type: m.media_type,
        media_name: m.media_name
      });
    });
  });

  // 2) Add manually selected individual messages too.
  selectedMessageIds.forEach(key => {
    const [chatId, msgId] = key.split("||");
    const chat = chatsData.find(c => String(c.id) === String(chatId));
    if (!chat) return;

    const msg = (chat.messages || []).find(m => String(m.id) === String(msgId));
    if (!msg) return;

    appendRow({
      key,
      text: msg.text,
      type: msg.type,
      number: chat.number || chat.name,
      datetime: msg.datetime,
      media_url: msg.media_url,
      media_type: msg.media_type,
      media_name: msg.media_name
    });
  });
});

function collectReportRows() {
  return [...reportRowsMap.values()].map(row => ({
    message: row.text || (row.media_type === "image" ? "[Image Evidence]" : "Media / Attachment"),
    type: row.type === "sent" ? "Sent" : "Received",
    number: row.number,
    datetime: row.datetime,
    media_url: row.media_url,
    media_type: row.media_type,
    media_name: row.media_name
  }));
}

    async function downloadReport(format) {
      const rows = collectReportRows();

      if (!rows.length) {
        alert("أضف الرسائل للتقرير أولًا");
        return;
      }

      let investigator = "Unknown";
      try {
        const user = JSON.parse(localStorage.getItem("currentUser") || "{}");
        investigator = user.name || "Unknown";
      } catch (e) {}

      const caseNumber = localStorage.getItem("CURRENT_CASE_ID") || localStorage.getItem("case_id") || "Case_001";

      try {
        const res = await fetch(`${API_BASE}/api/export/${format}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            messages: rows,
            investigator: investigator,
            caseNumber: caseNumber,
            status: "completed"
          })
        });

        if (!res.ok) {
          let errText = "فشل تنزيل التقرير";
          try {
            const errJson = await res.json();
            errText = errJson.error || errText;
          } catch (_) {}
          console.error("Export failed:", errText);
          alert(errText);
          return;
        }

        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = format === "pdf" ? `${caseNumber}_forensic_report.pdf` : `${caseNumber}_forensic_report.csv`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
      } catch (e) {
        console.error("Export error:", e);
        alert("حدث خطأ أثناء تنزيل التقرير");
      }
    }

    exportBtn.addEventListener("click", async () => {
      const lang = document.documentElement.lang || "ar";
      const choice = prompt(
        lang === "ar"
          ? "اكتب نوع الملف: pdf أو csv"
          : "Enter export format: pdf or csv",
        "pdf"
      );

      if (!choice) return;

      const format = choice.trim().toLowerCase();

      if (format !== "pdf" && format !== "csv") {
        alert(lang === "ar" ? "الصيغة غير صحيحة" : "Invalid format");
        return;
      }

      await downloadReport(format);
    });

    viewBtn.addEventListener("click", () => {
      localStorage.setItem("userRole", localStorage.getItem("userRole") || "user");
      localStorage.setItem(
        "currentUser",
        localStorage.getItem("currentUser") || JSON.stringify({ name: "Unknown", role: "user" })
      );
      window.location.href = "reports.html";
    });

    if (searchInput) {
      searchInput.addEventListener("input", () => {
        const q = searchInput.value.trim();
        renderSuggestions(q);
        applySearch(q);
      });

      searchInput.addEventListener("focus", () => {
        if (searchInput.value.trim()) {
          renderSuggestions(searchInput.value.trim());
        } else if (activeTagFilter !== "all") {
          showTagSuggestions();
        }
      });

      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          hideSuggestions();
          applySearch(searchInput.value.trim());
        }
      });
    }

    document.querySelectorAll(".tag").forEach(tag => {
      tag.addEventListener("click", () => {
        activeTagFilter = tag.dataset.tag || "all";
        document.querySelectorAll(".tag").forEach(t => t.classList.remove("active-tag"));
        tag.classList.add("active-tag");

        if (activeTagFilter === "all") {
          searchInput.value = "";
          currentSearchQuery = "";
          focusedMessageId = null;
          hideSuggestions();
          selectedChatId = chatsData.length ? chatsData[0].id : null;
          renderChatList(chatsData);
          if (selectedChatId) renderMessages(selectedChatId);
          else messageView.innerHTML = `<div class="empty-state">لا توجد محادثات لعرضها في هذه القضية</div>`;
          return;
        }

        searchInput.value = "";
        currentSearchQuery = "";
        focusedMessageId = null;

        const filtered = chatsData.filter(chat => chatMatchesTag(chat, activeTagFilter));
        selectedChatId = filtered.length ? filtered[0].id : null;
        renderChatList(filtered);
        if (selectedChatId) renderMessages(selectedChatId);
        else messageView.innerHTML = `<div class="empty-state">لا توجد نتائج لهذا الفلتر</div>`;

        showTagSuggestions();
      });
    });

    document.addEventListener("click", (e) => {
      const insideSearch = e.target.closest(".search-input-wrapper");
      const insideTags = e.target.closest(".tags-row");
      if (!insideSearch && !insideTags) {
        hideSuggestions();
      }
    });

async function loadUsersList(query = "") {
  try {
    const res = await fetch(`${API_BASE}/api/users/list?q=${encodeURIComponent(query)}`);
    const data = await res.json();

    if (!res.ok || !data.success) {
      userResults.innerHTML = `<div class="empty-state">تعذر تحميل المستخدمين</div>`;
      return;
    }

    const currentUser = JSON.parse(localStorage.getItem("currentUser") || "{}");
    availableUsers = (data.users || []).filter(u => String(u.id) !== String(currentUser.id));

    if (!availableUsers.length) {
      userResults.innerHTML = `<div class="empty-state">لا يوجد مستخدمون</div>`;
      return;
    }

    userResults.innerHTML = availableUsers.map(u => `
      <div class="user-item" data-user-id="${u.id}">
        <div class="user-item-name">${escapeHtml(u.name || "Unknown")}</div>
        <div class="user-item-email">${escapeHtml(u.email || "")}</div>
      </div>
    `).join("");

    document.querySelectorAll(".user-item").forEach(item => {
      item.addEventListener("click", () => {
        document.querySelectorAll(".user-item").forEach(x => x.classList.remove("active"));
        item.classList.add("active");
        selectedUserToAdd = item.getAttribute("data-user-id");
      });
    });

  } catch (e) {
    console.error("Load users error:", e);
    userResults.innerHTML = `<div class="empty-state">خطأ في تحميل المحققين</div>`;
  }
}

async function confirmAddUserToCase() {
  if (!selectedCaseId) { alert("لا توجد قضية محددة"); return; }
  if (!selectedUserToAdd) { alert("اختر مستخدمًا أولًا"); return; }

  // 👈 إضافة هذا السطر لجلب بياناتك (أنتِ المضيفة الآن)
  const currentUser = JSON.parse(localStorage.getItem("currentUser") || "{}");

  try {
    const res = await fetch(`${API_BASE}/api/case/add-user`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        case_id: selectedCaseId,
        user_id: selectedUserToAdd,
        added_by: currentUser.id // 👈 نرسل الـ ID الخاص بك لكي يتم تخزينه في العمود الجديد
      })
    });

const data = await res.json();
    if (!res.ok || !data.ok) { alert(data.error || "فشل إضافة المستخدم"); return; }

    alert("تمت إضافة المحقق بنجاح للقضية");
    closeAddInvestigatorPanel();
    loadCaseInvestigators(selectedCaseId);
  } catch (e) {
    console.error("Add user error:", e);
    alert("حدث خطأ أثناء إضافة المستخدم");
  }
}

async function loadCaseInvestigators(cId) {
  try {
    const res = await fetch(`${API_BASE}/api/case/investigators/${cId}`);
    const data = await res.json();

    const listDiv = document.getElementById("investigatorsList");
    if (!listDiv) return;

    const users = data.users || [];

    listDiv.innerHTML = users.map(u => {
      const isCreator = u.is_creator === true;

      return `
        <div style="
          display:flex;
          align-items:center;
          gap:8px;
          background:${isCreator ? "rgba(255, 200, 87, 0.08)" : "rgba(95,191,122,0.12)"};
          border:${isCreator ? "1.5px solid #ffc857" : "1px solid rgba(95,191,122,0.35)"};
          padding:6px 12px;
          border-radius:30px;
        ">
          ${isCreator ? `<i class="fa-solid fa-star" style="color:#ffc857; font-size:0.85rem;"></i>` : ""}
          <span style="color:white; font-weight:700; font-size:0.85rem;">
            ${escapeHtml(u.name)}
          </span>

          <button
            onclick="removeInvestigatorFromCase('${cId}', ${u.id})"
            style="
              background:none;
              border:none;
              color:#ffb3b3;
              cursor:pointer;
              font-size:0.8rem;
            ">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
      `;
    }).join("");

  } catch (e) {
    console.error("Load investigators error:", e);
  }
}


async function removeInvestigator(userId) {
    if (!confirm("هل أنت متأكد من حذف هذا المحقق من الفريق المشارك في القضية؟")) return;

    try {
        const res = await fetch(`${API_BASE}/api/case/remove-user`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                case_id: selectedCaseId, 
                user_id: userId 
            })
        });
        
        const data = await res.json();
        if (data.ok) {
            loadCaseInvestigators(selectedCaseId); 
        } else {
            alert(data.error || "فشل حذف المحقق");
        }
    } catch (e) {
        console.error("Remove investigator error:", e);
        alert("حدث خطأ أثناء محاولة الحذف");
    }
}
